<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AteşChat V20 🔥</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
margin-top:120px;
gap:10px;
}

input{
padding:12px;
border-radius:8px;
border:none;
width:220px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#ff6a00;
color:white;
font-weight:bold;
width:150px;
}

#chat{
display:none;
height:100vh;
}

#top{
background:#1a1a1a;
padding:10px;
display:flex;
justify-content:space-between;
}

#messages{
height:75vh;
overflow:auto;
padding:10px;
}

.msg{
margin:5px 0;
padding:8px;
background:#222;
border-radius:6px;
}

#sendArea{
position:fixed;
bottom:0;
width:100%;
display:flex;
}

#messageInput{
flex:1;
}

</style>
</head>

<body>

<div id="login">

<h1>AteşChat 🔥</h1>

<input id="email" placeholder="Email">
<input id="password" placeholder="Şifre" type="password">
<input id="username" placeholder="Kullanıcı adı">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>


<div id="chat">

<div id="top">

<div id="user"></div>

<button onclick="logout()">Çıkış</button>

</div>

<div id="messages"></div>

<div id="sendArea">

<input id="messageInput" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>

</div>

</div>



<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script>

const firebaseConfig = {

apiKey: "API_KEY",
authDomain: "AUTH_DOMAIN",
databaseURL: "DATABASE_URL",
projectId: "PROJECT_ID",
storageBucket: "STORAGE_BUCKET",
messagingSenderId: "SENDER_ID",
appId: "APP_ID"

}

firebase.initializeApp(firebaseConfig)

const auth = firebase.auth()
const db = firebase.database()

function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let username=document.getElementById("username").value

auth.createUserWithEmailAndPassword(email,password)

.then(user=>{

db.ref("users/"+user.user.uid).set({

username:username

})

})

}

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,password)

}

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="block"

db.ref("users/"+user.uid).once("value",snap=>{

document.getElementById("user").innerText=snap.val().username

})

loadMessages()

}

})

function send(){

let text=document.getElementById("messageInput").value

let user=auth.currentUser

db.ref("users/"+user.uid).once("value",snap=>{

let name=snap.val().username

db.ref("messages").push({

name:name,
text:text

})

})

document.getElementById("messageInput").value=""

}

function loadMessages(){

db.ref("messages").on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")
div.className="msg"

div.innerText=m.name+" : "+m.text

document.getElementById("messages").appendChild(div)

})

}

function logout(){

auth.signOut()

location.reload()

}

</script>

</body>
</html>
