<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AteşChat SV8.3</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* SAYFALAR */

.page{
display:none;
height:100vh;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
padding:20px;
}

/* INPUT */

input{
padding:12px;
border:none;
border-radius:10px;
width:250px;
font-size:16px;
}

/* BUTTON */

button{
padding:12px;
border:none;
border-radius:10px;
width:250px;
font-size:16px;
background:#ff3c3c;
color:white;
}

/* CHAT */

#chat{
display:flex;
flex-direction:column;
height:100vh;
}

#topbar{
background:#1c1c1c;
padding:15px;
text-align:center;
font-size:18px;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
margin-bottom:70px;
}

.msg{
background:#222;
padding:10px;
border-radius:10px;
margin:6px;
max-width:70%;
}

.me{
background:#ff3c3c;
margin-left:auto;
}

.time{
font-size:11px;
opacity:0.6;
margin-top:4px;
}

/* MESAJ KUTUSU */

#sendbox{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:#1c1c1c;
padding:10px;
gap:5px;
}

#msgInput{
flex:1;
}

#footer{
position:absolute;
bottom:70px;
width:100%;
text-align:center;
opacity:0.6;
}

</style>

</head>

<body>

<!-- ANA SAYFA -->

<div id="home" class="page center" style="display:flex">

<h2>🔥 AteşChat SV8.3</h2>

<button onclick="showLogin()">Giriş Yap</button>

<button onclick="showRegister()">Kayıt Ol</button>

</div>


<!-- LOGIN -->

<div id="login" class="page center">

<h2>Giriş</h2>

<input id="loginEmail" placeholder="Gmail">

<input id="loginPass" type="password" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

<button onclick="backHome()">Geri</button>

</div>


<!-- REGISTER -->

<div id="register" class="page center">

<h2>Kayıt Ol</h2>

<input id="regUser" placeholder="Kullanıcı adı">

<input id="regEmail" placeholder="Gmail">

<input id="regPass" type="password" placeholder="Şifre">

<button onclick="register()">Hesap oluştur</button>

<button onclick="backHome()">Geri</button>

</div>


<!-- CHAT -->

<div id="chat" class="page">

<div id="topbar">
🔥 AteşChat
</div>

<div id="messages"></div>

<div id="footer">AteşChat SV8.3</div>

<div id="sendbox">

<input id="msgInput" placeholder="Mesaj yaz">

<button onclick="send()">Gönder</button>

</div>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script>

const firebaseConfig={
apiKey:"AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain:"ateschat-cd9f4.firebaseapp.com",
databaseURL:"https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId:"ateschat-cd9f4",
storageBucket:"ateschat-cd9f4.firebasestorage.app",
messagingSenderId:"174732212740",
appId:"1:174732212740:web:dcd4b60ed7cc380ca95351"
}

firebase.initializeApp(firebaseConfig)

let db=firebase.database()

let user=""
let isAdmin=false


function hideAll(){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

}

function showLogin(){

hideAll()
document.getElementById("login").style.display="flex"

}

function showRegister(){

hideAll()
document.getElementById("register").style.display="flex"

}

function backHome(){

hideAll()
document.getElementById("home").style.display="flex"

}


/* REGISTER */

function register(){

let username=document.getElementById("regUser").value
let email=document.getElementById("regEmail").value
let pass=document.getElementById("regPass").value

if(username==""||email==""||pass==""){
alert("Bilgileri doldur")
return
}

db.ref("users").push({
username:username,
email:email,
pass:pass
})

alert("Kayıt tamam")

backHome()

}


/* LOGIN */

function login(){

let email=document.getElementById("loginEmail").value
let pass=document.getElementById("loginPass").value


if(email=="AtesBey" && pass=="123ates"){

user="🔥 Ateş Bey (Admin)"
isAdmin=true
startChat()
return

}


db.ref("users").once("value",snap=>{

let found=false

snap.forEach(u=>{

let data=u.val()

if(data.email==email && data.pass==pass){

user=data.username
found=true

}

})

if(found){

startChat()

}else{

alert("Giriş hatalı")

}

})

}


/* CHAT */

function startChat(){

hideAll()

document.getElementById("chat").style.display="flex"

loadMessages()

}


/* SEND */

function send(){

let text=document.getElementById("msgInput").value

if(text=="")return

db.ref("messages").push({

user:user,
text:text,
time:Date.now()

})

document.getElementById("msgInput").value=""

}


/* LOAD */

function loadMessages(){

db.ref("messages").on("child_added",snap=>{

let data=snap.val()

let div=document.createElement("div")

div.className="msg"

if(data.user==user){

div.classList.add("me")

}

let time=""

if(data.time){

let d=new Date(data.time)

time=d.getHours()+":"+("0"+d.getMinutes()).slice(-2)

}

div.innerHTML="<b>"+data.user+"</b><br>"+data.text+"<div class='time'>"+time+"</div>"

document.getElementById("messages").appendChild(div)

document.getElementById("messages").scrollTop=999999

})

}


/* ENTER */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){

send()

}

})

</script>

</body>
</html>
