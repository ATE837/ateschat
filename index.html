<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateş Chat | Discord Mode</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-container" class="auth-box">
        <div class="auth-content">
            <div class="fire-icon">🔥</div>
            <h1>Ateş Chat</h1>
            <p>Arkadaşlarınla buluşmanın en sıcak yolu.</p>
            
            <button id="google-login-btn" class="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
                Google ile Giriş Yap
            </button>
        </div>
    </div>

    <div id="main-layout" class="hidden">
        <aside class="channel-sidebar">
            <div class="server-header">Ateş Chat Sunucusu</div>
            <div class="channel-list">
                <div class="channel-item active"><span>#</span> genel-sohbet</div>
                <div class="channel-item" onclick="alert('Yakında!')"><span>#</span> oyun-odası</div>
            </div>
            
            <div class="user-footer">
                <img id="user-avatar" src="https://via.placeholder.com/32" alt="">
                <div class="user-info">
                    <span id="user-name">Yükleniyor...</span>
                    <span class="user-tag">#0001</span>
                </div>
                <button id="logout-btn">❌</button>
            </div>
        </aside>

        <main class="chat-main">
            <div class="chat-header">
                <span class="hashtag">#</span> genel-sohbet
            </div>
            
            <div id="messages-container" class="messages-area">
                </div>

            <div class="input-container">
                <form id="chat-form">
                    <input type="text" id="message-input" placeholder="#genel-sohbet kanalına mesaj gönder" autocomplete="off">
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
