<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AteşChat V2 🔥</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0e0e0e;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:200px;
background:#151515;
padding:15px;
border-right:1px solid #333;
}

#sidebar h2{
text-align:center;
}

.room{
padding:8px;
background:#222;
margin-bottom:6px;
border-radius:6px;
cursor:pointer;
}

.room:hover{
background:#ff6a00;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
background:#1b1b1b;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.user{
color:#ff6a00;
font-weight:bold;
}

.time{
font-size:11px;
color:#888;
}

#send{
display:flex;
padding:10px;
background:#111;
}

#send input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

#send button{
margin-left:8px;
padding:10px 15px;
background:#ff6a00;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#login{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#0e0e0e;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:10px;
}

#login input{
padding:10px;
border:none;
border-radius:6px;
width:220px;
}

#users{
width:180px;
background:#141414;
border-left:1px solid #333;
padding:10px;
}

</style>
</head>

<body>

<div id="sidebar">

<h2>AteşChat 🔥</h2>

<div class="room" onclick="room='genel'">Genel</div>
<div class="room" onclick="room='oyun'">Oyun</div>
<div class="room" onclick="room='sohbet'">Sohbet</div>

</div>

<div id="main">

<div id="chat"></div>

<div id="send">
<input id="msg" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>
</div>

</div>

<div id="users">
<b>Online</b>
<div id="userList"></div>
</div>

<div id="login">

<h2>AteşChat Giriş</h2>

<input id="username" placeholder="Kullanıcı Adı">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Şifre">

<div>
<button onclick="register()">Kayıt</button>
<button onclick="login()">Giriş</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
push,
set,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"APIKEY",
authDomain:"PROJECT.firebaseapp.com",
databaseURL:"https://PROJECT-default-rtdb.firebaseio.com",
projectId:"PROJECT",
storageBucket:"PROJECT.appspot.com",
messagingSenderId:"ID",
appId:"APPID"

};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

let room="genel";

function register(){

createUserWithEmailAndPassword(
auth,
email.value,
pass.value
).then(()=>{

set(ref(db,"users/"+auth.currentUser.uid),{
name:username.value
});

alert("Kayıt başarılı");

}).catch(e=>alert(e.message));

}

function login(){

signInWithEmailAndPassword(
auth,
email.value,
pass.value
).catch(e=>alert(e.message));

}

onAuthStateChanged(auth,(user)=>{

if(user){

login.style.display="none";

loadMessages();

}

});

function send(){

const text=msg.value;

push(ref(db,"rooms/"+room),{

user:username.value,
text:text,
time:new Date().toLocaleTimeString()

});

msg.value="";

}

function loadMessages(){

onChildAdded(ref(db,"rooms/"+room),(data)=>{

const m=data.val();

const div=document.createElement("div");
div.className="msg";

div.innerHTML=
"<span class='user'>"+m.user+
"</span> <span class='time'>"+m.time+
"</span><br>"+m.text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

});

}

</script>

</body>
</html>
