<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AteşChat</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#36393f;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

#topbar{
background:#202225;
padding:8px;
display:flex;
align-items:center;
gap:10px;
}

#app{
display:flex;
flex:1;
height:100%;
}

#servers{
width:60px;
background:#202225;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
}

.server{
width:40px;
height:40px;
background:#5865f2;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
font-weight:bold;
}

#rooms{
width:150px;
background:#2f3136;
padding:10px;
}

#rooms button{
width:100%;
margin-bottom:10px;
}

#roomList div{
padding:6px;
cursor:pointer;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
display:flex;
margin-bottom:12px;
}

.msg img{
width:36px;
height:36px;
border-radius:50%;
margin-right:10px;
object-fit:cover;
}

.name{
font-weight:bold;
}

#inputArea{
display:flex;
padding:10px;
background:#40444b;
}

#text{
flex:1;
padding:10px;
border:none;
border-radius:5px;
background:#303339;
color:white;
}

button{
background:#5865f2;
border:none;
color:white;
padding:10px;
margin-left:5px;
border-radius:5px;
}

@media(max-width:700px){

#servers{
width:50px;
}

#rooms{
width:120px;
}

.msg img{
width:30px;
height:30px;
}

}

</style>
</head>

<body>

<div id="topbar">

<input type="file" id="profileFile">
<button onclick="uploadProfile()">Profil Yükle</button>

</div>

<div id="app">

<div id="servers">

<div class="server">+</div>

</div>

<div id="rooms">

<h3>Odalar</h3>

<button onclick="addRoom()">+ Oda</button>

<div id="roomList"></div>

</div>

<div id="chat">

<div id="messages"></div>

<div id="inputArea">

<input id="text" placeholder="Mesaj yaz...">

<button onclick="sendMessage()">Gönder</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, push, onChildAdded }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import { getStorage, ref as sRef, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {

apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain: "ateschat-cd9f4.firebaseapp.com",
databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId: "ateschat-cd9f4",
storageBucket: "ateschat-cd9f4.firebasestorage.app",
messagingSenderId: "174732212740",
appId: "1:174732212740:web:dcd4b60ed7cc380ca95351",
measurementId: "G-1CBZNR0W3E"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const storage = getStorage(app);

let profileURL="";

const messagesRef = ref(db,"messages");

window.uploadProfile=function(){

let file=document.getElementById("profileFile").files[0];

if(!file){
alert("Fotoğraf seç");
return;
}

let storageRef=sRef(storage,"profiles/"+Date.now());

uploadBytes(storageRef,file).then(()=>{

getDownloadURL(storageRef).then((url)=>{

profileURL=url;

alert("Profil yüklendi");

});

});

}

window.sendMessage=function(){

let text=document.getElementById("text").value;

if(text=="") return;

push(messagesRef,{

user:"Kullanıcı",
text:text,
photo:profileURL,
time:Date.now()

});

document.getElementById("text").value="";

}

onChildAdded(messagesRef,(data)=>{

let msg=data.val();

let div=document.createElement("div");

div.className="msg";

div.innerHTML=`

<img src="${msg.photo || "https://i.imgur.com/6VBx3io.png"}">

<div>

<div class="name">${msg.user}</div>

<div>${msg.text}</div>

</div>

`;

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop=999999;

});

window.addRoom=function(){

let name=prompt("Oda adı");

if(!name) return;

let div=document.createElement("div");

div.innerText="# "+name;

document.getElementById("roomList").appendChild(div);

}

</script>

</body>
</html>
