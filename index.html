<!DOCTYPE html>
<html>
<head>

<title>AteşChat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1f22;
color:white;
}

/* LOGIN */

#login{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#5865F2;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* APP */

#app{
display:none;
height:100vh;
}

/* SERVER BAR */

.servers{
width:70px;
background:#2b2d31;
height:100%;
float:left;
text-align:center;
padding-top:10px;
}

.server{
background:#404249;
margin:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.server:hover{
background:#5865F2;
}

/* CHANNELS */

.channels{
width:200px;
background:#313338;
height:100%;
float:left;
padding:10px;
}

.channel{
padding:8px;
cursor:pointer;
border-radius:5px;
}

.channel:hover{
background:#404249;
}

/* CHAT */

.chat{
margin-left:270px;
margin-right:200px;
height:100%;
display:flex;
flex-direction:column;
}

.top{
background:#313338;
padding:10px;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
background:#404249;
margin:5px;
padding:8px;
border-radius:5px;
}

.send{
background:#313338;
padding:10px;
}

/* USERS */

.users{
width:200px;
background:#2b2d31;
position:absolute;
right:0;
top:0;
bottom:0;
padding:10px;
}

.user{
padding:5px;
background:#404249;
margin:5px 0;
border-radius:5px;
cursor:pointer;
}

.admin{
color:#ff5555;
font-weight:bold;
}

.demo{
font-size:13px;
color:#aaa;
margin-top:20px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<h1>🔥 AteşChat</h1>

<input id="user" placeholder="Kullanıcı adı"><br>
<input id="pass" type="password" placeholder="Şifre"><br>

<button onclick="login()">Giriş</button>

<div class="demo">

Demo Admin Giriş<br>
Kullanıcı: <b>Ateş Bey</b><br>
Şifre: <b>Ateş123</b>

</div>

</div>

<!-- APP -->

<div id="app">

<div class="servers" id="servers">

<div class="server">💬</div>
<div class="server">🎮</div>
<div class="server">🎵</div>

<div class="server" onclick="createServer()">+</div>

</div>

<div class="channels">

<h3>Kanallar</h3>

<div class="channel" onclick="openRoom('Genel')"># genel</div>
<div class="channel" onclick="openRoom('Oyun')"># oyun</div>
<div class="channel" onclick="openRoom('Müzik')"># müzik</div>

</div>

<div class="chat">

<div class="top">

<span id="roomName">Genel</span>

</div>

<div class="messages" id="chatBox"></div>

<div class="send">

<input id="msg" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>

</div>

</div>

<div class="users">

<h3>Kullanıcılar</h3>

<div id="userList"></div>

</div>

</div>

<script>

let users={
"Ateş Bey":"Ateş123"
}

let currentUser=""
let currentRoom="Genel"

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u]==p){

currentUser=u

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

addUser()

}else{

alert("Hatalı giriş")

}

}

function addUser(){

let list=document.getElementById("userList")

if(currentUser=="Ateş Bey"){

list.innerHTML += "<div class='user admin'>👑 "+currentUser+"</div>"

}else{

list.innerHTML += "<div class='user'>"+currentUser+"</div>"

}

}

function openRoom(name){

currentRoom=name

document.getElementById("roomName").innerText=name

document.getElementById("chatBox").innerHTML=""

}

function send(){

let msg=document.getElementById("msg").value

if(msg=="") return

let chat=document.getElementById("chatBox")

chat.innerHTML += "<div class='msg'><b>"+currentUser+":</b> "+msg+"</div>"

document.getElementById("msg").value=""

}

function createServer(){

let name = prompt("Sunucu adı yaz")

if(name){

let servers = document.getElementById("servers")

let div = document.createElement("div")

div.className="server"

div.innerText=name[0].toUpperCase()

servers.insertBefore(div, servers.lastElementChild)

}

}

</script>

</body>
</html>
