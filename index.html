<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen">
        <div style="background:#2f3136; padding:30px; border-radius:8px; width:300px;">
            <h2 style="color:#5865f2; text-align:center;">NovaChat</h2>
            
            <input type="email" id="email" placeholder="E-posta" style="width:100%; padding:10px; margin:10px 0; background:#202225; border:none; color:white;">
            <input type="password" id="password" placeholder="Şifre" style="width:100%; padding:10px; margin:10px 0; background:#202225; border:none; color:white;">
            
            <button onclick="login()" style="width:100%; padding:10px; background:#5865f2; color:white; border:none; border-radius:4px; margin:5px 0;">Giriş Yap</button>
            <button onclick="register()" style="width:100%; padding:10px; background:#3ba55d; color:white; border:none; border-radius:4px; margin:5px 0;">Kayıt Ol</button>
            <button onclick="adminLogin()" style="width:100%; padding:10px; background:#ed4245; color:white; border:none; border-radius:4px; margin:5px 0;">Admin Giriş</button>
            
            <div id="error" style="color:#ed4245; margin-top:10px; text-align:center;"></div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app" style="display:none;">
        <h1>Hoş Geldin!</h1>
        <button onclick="logout()">Çıkış Yap</button>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- UYGULAMA -->
    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
