<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AteşChat</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN PANEL -->

<div id="login">

<h1>AteşChat 🔥</h1>

<input id="username" type="text" placeholder="Kullanıcı adı">

<input id="password" type="password" placeholder="Şifre">

<input id="photo" type="text" placeholder="Profil foto linki (opsiyonel)">

<button id="registerBtn">Kayıt Ol</button>

<button id="loginBtn">Giriş Yap</button>

<div id="error"></div>

</div>


<!-- CHAT APP -->

<div id="app" style="display:none;">

<div id="sidebar">

<h3>Odalar</h3>

<div onclick="openRoom('global')">🌍 Global</div>
<div onclick="openRoom('sohbet')">💬 Sohbet</div>
<div onclick="openRoom('gaming')">🎮 Gaming</div>

<h3>Kullanıcılar</h3>

<div id="users"></div>

</div>


<div id="chat">

<div id="top">

<div id="roomName">Global</div>

<button onclick="logout()">Çıkış</button>

</div>

<div id="messages"></div>

<div id="sendArea">

<input id="messageInput" placeholder="Mesaj yaz...">

<button onclick="openEmoji()">😀</button>

<button onclick="send()">Gönder</button>

</div>

</div>

</div>


<!-- EMOJI PANEL -->

<div id="emojiPanel" style="display:none;">

<span onclick="addEmoji('😀')">😀</span>
<span onclick="addEmoji('😂')">😂</span>
<span onclick="addEmoji('🔥')">🔥</span>
<span onclick="addEmoji('❤️')">❤️</span>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<!-- PROJECT FILES -->

<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="chat.js"></script>
<script src="dm.js"></script>
<script src="admin.js"></script>
<script src="emoji.js"></script>


<script>

document.getElementById("registerBtn").onclick = function(){
register()
}

document.getElementById("loginBtn").onclick = function(){
login()
}

</script>

</body>

</html>
