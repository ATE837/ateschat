<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AteşChat V7</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#login,#register{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:10px;
}

input{
padding:12px;
border-radius:8px;
border:none;
width:220px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#ff3c3c;
color:white;
width:220px;
}

#chat{
display:none;
height:100vh;
flex-direction:column;
}

#topbar{
background:#1f1f1f;
padding:15px;
text-align:center;
font-size:20px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
background:#2a2a2a;
padding:10px;
border-radius:10px;
margin:5px;
max-width:70%;
}

.me{
background:#ff3c3c;
margin-left:auto;
}

#sendbox{
display:flex;
padding:10px;
background:#1f1f1f;
}

#msgInput{
flex:1;
margin-right:5px;
}

</style>
</head>

<body>

<div id="login">
<h2>AteşChat V7</h2>
<input id="loginEmail" placeholder="Gmail">
<input id="loginPass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
<button onclick="showRegister()">Kayıt Ol</button>
</div>

<div id="register" style="display:none">
<h2>Kayıt Ol</h2>
<input id="regEmail" placeholder="Gmail">
<input id="regUser" placeholder="Kullanıcı adı">
<input id="regPass" type="password" placeholder="Şifre">
<input id="regPass2" type="password" placeholder="Şifre tekrar">
<button onclick="register()">Kaydet</button>
<button onclick="showLogin()">Geri</button>
</div>

<div id="chat">

<div id="topbar">
🔥 AteşChat V7
</div>

<div id="messages"></div>

<div id="sendbox">
<input id="msgInput" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey:"APIKEY",
authDomain:"PROJECT.firebaseapp.com",
databaseURL:"https://PROJECT-default-rtdb.firebaseio.com/",
projectId:"PROJECT",
storageBucket:"PROJECT.appspot.com",
messagingSenderId:"123",
appId:"APPID"
};

firebase.initializeApp(firebaseConfig);

let db = firebase.database();

let user="";

function showRegister(){
document.getElementById("login").style.display="none"
document.getElementById("register").style.display="flex"
}

function showLogin(){
document.getElementById("login").style.display="flex"
document.getElementById("register").style.display="none"
}

function register(){

let email=document.getElementById("regEmail").value
let username=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value
let pass2=document.getElementById("regPass2").value

if(pass!=pass2){
alert("Şifreler aynı değil")
return
}

localStorage.setItem("user",username)

alert("Kayıt tamam")
showLogin()

}

function login(){

let username=localStorage.getItem("user")

if(!username){
alert("Önce kayıt ol")
return
}

user=username

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="flex"

loadMessages()

}

function send(){

let text=document.getElementById("msgInput").value

if(text=="") return

db.ref("messages").push({
user:user,
text:text,
time:Date.now()
})

document.getElementById("msgInput").value=""

}

function loadMessages(){

db.ref("messages").on("child_added",snap=>{

let data=snap.val()

let div=document.createElement("div")

div.className="msg"

if(data.user==user){
div.classList.add("me")
}

let date=new Date(data.time)
let time=date.getHours()+":"+date.getMinutes()

div.innerHTML="<b>"+data.user+"</b><br>"+data.text+"<br><small>"+time+"</small>"

document.getElementById("messages").appendChild(div)

document.getElementById("messages").scrollTop=999999

})

}

</script>

</body>
</html>
