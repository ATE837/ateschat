<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaChat - Yeni Düzen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #dcddde;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* SOL SUNUCU LİSTESİ - SABİT */
        .servers {
            width: 72px;
            background: #202225;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 10;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #36393f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            color: #dcddde;
            font-size: 20px;
            position: relative;
        }

        .server-icon:hover {
            border-radius: 16px;
            background: #5865f2;
            color: white;
        }

        .server-icon.home {
            background: #5865f2;
            color: white;
        }

        .server-divider {
            width: 32px;
            height: 2px;
            background: #36393f;
            margin: 8px 0;
        }

        /* ORTA KANAL LİSTESİ - AÇILIR/KAPANIR */
        .channels {
            width: 240px;
            background: #2f3136;
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            z-index: 5;
        }

        .channels.collapsed {
            transform: translateX(-240px);
        }

        .channels-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .channels-header h2 {
            font-size: 16px;
            color: white;
            font-weight: 600;
        }

        .channels-header i {
            color: #b9bbbe;
            cursor: pointer;
            padding: 4px;
        }

        .channels-header i:hover {
            color: white;
        }

        .channels-search {
            padding: 8px 16px;
        }

        .channels-search input {
            width: 100%;
            padding: 6px 8px;
            background: #202225;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .category {
            margin-bottom: 16px;
        }

        .category-title {
            padding: 4px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #8e9297;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .channel-item {
            padding: 6px 16px 6px 32px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8e9297;
            cursor: pointer;
            border-radius: 4px;
            margin: 0 8px;
            font-size: 14px;
        }

        .channel-item:hover {
            background: #36393f;
            color: #dcddde;
        }

        .channel-item.active {
            background: #404249;
            color: white;
        }

        .channel-item i {
            font-size: 18px;
            width: 20px;
        }

        .channel-count {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .channel-count .online { color: #3ba55d; }

        /* KULLANICI PANELİ */
        .user-panel {
            padding: 8px 16px;
            background: #292b2f;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #202225;
            cursor: pointer;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 500;
            font-size: 14px;
            color: white;
        }

        .user-status {
            font-size: 12px;
            color: #3ba55d;
        }

        /* CHAT ALANI - GENİŞ */
        .chat {
            flex: 1;
            background: #36393f;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
            transition: all 0.3s ease;
        }

        .chat.expanded {
            margin-left: 0;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header i {
            color: #8e9297;
            font-size: 20px;
            cursor: pointer;
        }

        .chat-header i:hover {
            color: white;
        }

        .chat-header h3 {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-actions {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        .chat-actions i {
            font-size: 18px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
            padding: 4px 0;
            margin-bottom: 4px;
        }

        .message:hover {
            background: #404249;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 500;
            color: white;
        }

        .message-time {
            font-size: 12px;
            color: #8e9297;
        }

        .message-text {
            color: #dcddde;
        }

        .message-input {
            padding: 16px;
            background: #404249;
            margin: 16px;
            border-radius: 8px;
        }

        .message-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #404249;
        }

        .message-input-wrapper input {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            color: white;
            outline: none;
        }

        .message-input-wrapper i {
            color: #b9bbbe;
            cursor: pointer;
            font-size: 18px;
        }

        .message-input-wrapper i:hover {
            color: white;
        }

        .send-btn {
            color: #5865f2 !important;
        }

        /* SAĞ ÜYE LİSTESİ */
        .members {
            width: 240px;
            background: #2f3136;
            padding: 16px;
            border-left: 1px solid #202225;
            overflow-y: auto;
            height: 100vh;
            flex-shrink: 0;
        }

        .members-header {
            color: #8e9297;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .member-item:hover {
            background: #36393f;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: white;
            font-weight: bold;
            position: relative;
        }

        .member-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid #2f3136;
        }

        .status-online { background: #3ba55d; }

        .member-name {
            flex: 1;
            font-size: 14px;
        }

        /* GİRİŞ EKRANI */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 8px;
            width: 400px;
        }

        .login-box h1 {
            text-align: center;
            color: #5865f2;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #202225;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .login-box button:hover {
            background: #4752c4;
        }

        .error {
            color: #ed4245;
            text-align: center;
            margin-top: 8px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2f3136;
            border-radius: 8px;
            width: 400px;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: white;
            font-size: 20px;
        }

        .close-modal {
            color: #b9bbbe;
            cursor: pointer;
            font-size: 20px;
        }

        .close-modal:hover {
            color: white;
        }

        .modal-body input, .modal-body textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            background: #202225;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .modal-body button {
            width: 100%;
            padding: 8px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>NovaChat</h1>
            <input type="email" id="loginEmail" placeholder="E-posta">
            <input type="password" id="loginPassword" placeholder="Şifre">
            <button onclick="login()">Giriş Yap</button>
            <button onclick="register()">Kayıt Ol</button>
            <button onclick="adminLogin()" style="background:#ed4245;">Admin Giriş</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app" style="display: none;">
        <!-- SOL SUNUCU LİSTESİ -->
        <div class="servers">
            <div class="server-icon home" onclick="toggleHome()">
                <i class="fas fa-home"></i>
            </div>
            <div class="server-icon" onclick="showCreateServer()">
                <i class="fas fa-plus"></i>
            </div>
            <div class="server-divider"></div>
            <div class="server-icon" onclick="selectServer('genel')">G</div>
            <div class="server-icon" onclick="selectServer('oyun')">O</div>
            <div class="server-icon" onclick="selectServer('müzik')">M</div>
        </div>

        <!-- ORTA KANAL LİSTESİ -->
        <div class="channels" id="channels">
            <div class="channels-header">
                <h2 id="serverName">Ana Sayfa</h2>
                <i class="fas fa-bars" onclick="toggleChannels()"></i>
            </div>
            <div class="channels-search">
                <input type="text" placeholder="Ara">
            </div>
            <div class="channels-list">
                <div class="category">
                    <div class="category-title">
                        <span>METİN KANALLARI</span>
                        <i class="fas fa-plus" onclick="showAddChannel()"></i>
                    </div>
                    <div id="textChannels">
                        <div class="channel-item active" onclick="selectChannel('genel')">
                            <i class="fas fa-hashtag"></i> genel
                        </div>
                        <div class="channel-item" onclick="selectChannel('sohbet')">
                            <i class="fas fa-hashtag"></i> sohbet
                        </div>
                        <div class="channel-item" onclick="selectChannel('duyuru')">
                            <i class="fas fa-bullhorn"></i> duyuru
                        </div>
                    </div>
                </div>
                <div class="category">
                    <div class="category-title">
                        <span>SES KANALLARI</span>
                        <i class="fas fa-plus" onclick="showAddVoiceChannel()"></i>
                    </div>
                    <div id="voiceChannels">
                        <div class="channel-item" onclick="joinVoice('Genel Sohbet')">
                            <i class="fas fa-volume-up"></i> Genel Sohbet
                            <span class="channel-count">
                                <span class="online">●</span> 3
                            </span>
                        </div>
                        <div class="channel-item" onclick="joinVoice('Oyun Odası')">
                            <i class="fas fa-volume-up"></i> Oyun Odası
                            <span class="channel-count">
                                <span class="online">●</span> 2
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="user-panel" onclick="showProfile()">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Yükleniyor...</div>
                    <div class="user-status" id="userStatus">Çevrimiçi</div>
                </div>
            </div>
        </div>

        <!-- CHAT ALANI -->
        <div class="chat" id="chat">
            <div class="chat-header">
                <i class="fas fa-chevron-left" onclick="toggleChannels()" style="display: none;" id="menuIcon"></i>
                <i class="fas fa-hashtag"></i>
                <h3 id="channelName">genel</h3>
                <div class="chat-actions">
                    <i class="fas fa-phone" onclick="startVoiceCall()"></i>
                    <i class="fas fa-video" onclick="startVideoCall()"></i>
                    <i class="fas fa-user-plus" onclick="showAddFriend()"></i>
                    <i class="fas fa-search"></i>
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="message-input">
                <div class="message-input-wrapper">
                    <i class="fas fa-plus-circle"></i>
                    <input type="text" id="messageInput" placeholder="Mesaj #genel" onkeydown="if(event.key==='Enter') sendMessage()">
                    <i class="fas fa-smile"></i>
                    <i class="fas fa-paper-plane send-btn" onclick="sendMessage()"></i>
                </div>
            </div>
        </div>

        <!-- SAĞ ÜYE LİSTESİ -->
        <div class="members">
            <div class="members-header">ÜYELER — <span id="memberCount">0</span></div>
            <div id="membersList"></div>
        </div>
    </div>

    <!-- SUNUCU OLUŞTUR MODAL -->
    <div id="createServerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Sunucu Oluştur</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('createServerModal')"></i>
            </div>
            <div class="modal-body">
                <input type="text" id="serverNameInput" placeholder="Sunucu adı">
                <button onclick="createServer()">Oluştur</button>
            </div>
        </div>
    </div>

    <!-- PROFİL MODAL -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Profil</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('profileModal')"></i>
            </div>
            <div class="modal-body">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div class="user-avatar" style="width: 80px; height: 80px; margin: 0 auto; font-size: 32px;" id="modalAvatar">A</div>
                </div>
                <input type="text" id="profileName" placeholder="Kullanıcı adı">
                <textarea id="profileBio" placeholder="Hakkında" rows="3"></textarea>
                <select id="profileStatus">
                    <option value="online">Çevrimiçi</option>
                    <option value="idle">Boşta</option>
                    <option value="dnd">Rahatsız Etme</option>
                </select>
                <button onclick="saveProfile()">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // ===== FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
            authDomain: "ateschat-cd9f4.firebaseapp.com",
            projectId: "ateschat-cd9f4",
            storageBucket: "ateschat-cd9f4.firebasestorage.app",
            messagingSenderId: "174732212740",
            appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== GLOBAL =====
        let currentUser = null;
        let currentChannel = 'genel';
        let channelsVisible = true;
        let isHome = true;

        // ===== AUTH =====
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('userName').innerText = user.displayName || 'Kullanıcı';
                document.getElementById('userAvatar').innerText = (user.displayName || 'K')[0].toUpperCase();
                document.getElementById('modalAvatar').innerText = (user.displayName || 'K')[0].toUpperCase();
                
                loadMessages();
                loadMembers();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // ===== GİRİŞ =====
        window.login = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch(e => document.getElementById('loginError').innerText = e.message);
        };

        window.register = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .then(cred => cred.user.updateProfile({ displayName: 'Kullanıcı' }))
                .catch(e => document.getElementById('loginError').innerText = e.message);
        };

        window.adminLogin = () => {
            const pass = document.getElementById('loginPassword').value;
            if (pass === 'NovaChat2024!') {
                auth.signInWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                    .catch(() => {
                        auth.createUserWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                            .then(cred => cred.user.updateProfile({ displayName: 'Admin' }));
                    });
            } else {
                document.getElementById('loginError').innerText = 'Hatalı şifre';
            }
        };

        // ===== ANA SAYFA TOGGLE =====
        window.toggleHome = () => {
            if (isHome) {
                // Ana sayfa açık -> kapat, chat genişlesin
                document.getElementById('channels').classList.add('collapsed');
                document.getElementById('menuIcon').style.display = 'block';
                isHome = false;
            } else {
                // Ana sayfa kapalı -> aç
                document.getElementById('channels').classList.remove('collapsed');
                document.getElementById('menuIcon').style.display = 'none';
                isHome = true;
            }
        };

        window.toggleChannels = () => {
            document.getElementById('channels').classList.toggle('collapsed');
            if (document.getElementById('channels').classList.contains('collapsed')) {
                document.getElementById('menuIcon').style.display = 'block';
            } else {
                document.getElementById('menuIcon').style.display = 'none';
            }
        };

        window.selectServer = (server) => {
            document.getElementById('serverName').innerText = 
                server === 'genel' ? 'Genel Sohbet' :
                server === 'oyun' ? 'Oyun Dünyası' : 'Müzik Kafesi';
            
            // Sunucu seçince ana sayfa kapansın, chat genişlesin
            document.getElementById('channels').classList.add('collapsed');
            document.getElementById('menuIcon').style.display = 'block';
            isHome = false;
        };

        // ===== MESAJLAŞMA =====
        function loadMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = `
                <div class="message">
                    <div class="message-avatar">N</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-author">NovaBot</span>
                            <span class="message-time">12:34</span>
                        </div>
                        <div class="message-text">NovaChat'e hoş geldiniz! 👋</div>
                    </div>
                </div>
                <div class="message">
                    <div class="message-avatar">A</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-author">Admin</span>
                            <span class="message-time">12:35</span>
                        </div>
                        <div class="message-text">Artık sunucu açıp kapatabiliyorsunuz! ✨</div>
                    </div>
                </div>
            `;
        }

        window.sendMessage = () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const container = document.getElementById('messages');
            container.innerHTML += `
                <div class="message">
                    <div class="message-avatar">${(currentUser.displayName || 'B')[0]}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-author">${currentUser.displayName || 'Ben'}</span>
                            <span class="message-time">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="message-text">${text}</div>
                    </div>
                </div>
            `;
            input.value = '';
        };

        // ===== ÜYE LİSTESİ =====
        function loadMembers() {
            const list = document.getElementById('membersList');
            list.innerHTML = `
                <div class="member-item">
                    <div class="member-avatar">
                        A
                        <span class="member-status status-online"></span>
                    </div>
                    <span class="member-name">Admin</span>
                </div>
                <div class="member-item">
                    <div class="member-avatar">
