<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>AteşChat</title><style>
body{
margin:0;
font-family:Arial;
background:#2f3136;
color:white;
}

#login{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
background:#5865f2;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#app{
display:none;
height:100vh;
}

#sidebar{
width:230px;
background:#202225;
padding:10px;
overflow:auto;
}

#rooms div{
padding:6px;
cursor:pointer;
background:#2f3136;
margin-bottom:5px;
border-radius:5px;
}

#users div{
padding:6px;
background:#40444b;
margin-bottom:5px;
border-radius:5px;
cursor:pointer;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
background:#40444b;
padding:8px;
margin:5px;
border-radius:6px;
}

#sendBox{
display:flex;
background:#202225;
padding:10px;
}

#sendBox input{
flex:1;
}

.container{
display:flex;
height:100%;
}
</style></head><body><div id="login"><h1>AteşChat</h1><input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Şifre"><br>
<input id="username" placeholder="Kullanıcı adı"><br>

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div><div id="app"><div class="container"><div id="sidebar"><h3>Odalar</h3>
<div id="rooms"></div><h3>Online</h3>
<div id="users"></div></div><div id="chat"><div id="messages"></div><div id="sendBox">
<input id="msgInput" placeholder="Mesaj yaz">
<button onclick="send()">Gönder</button>
</div></div></div></div><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script><script>

const firebaseConfig = {
apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain: "ateschat-cd9f4.firebaseapp.com",
databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId: "ateschat-cd9f4",
storageBucket: "ateschat-cd9f4.firebasestorage.app",
messagingSenderId: "174732212740",
appId: "1:174732212740:web:9a8a298eca9b3313a95351"
};

firebase.initializeApp(firebaseConfig);

let currentRoom="genel";

function register(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value
let name=document.getElementById("username").value

firebase.auth().createUserWithEmailAndPassword(email,pass)
.then(res=>{

firebase.database().ref("users/"+res.user.uid).set({
name:name,
online:true
})

alert("Kayıt tamam")

})

.catch(e=>alert(e.message))

}

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,pass)
.then(()=>{

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

init()

})

.catch(e=>alert(e.message))

}

function init(){

let uid=firebase.auth().currentUser.uid

firebase.database().ref("users/"+uid+"/online").set(true)

loadUsers()
loadRooms()
loadMessages()

}

function send(){

let text=document.getElementById("msgInput").value

if(text=="")return

let uid=firebase.auth().currentUser.uid

firebase.database().ref("messages/"+currentRoom).push({
user:uid,
text:text,
time:Date.now()
})

document.getElementById("msgInput").value=""

}

function loadMessages(){

document.getElementById("messages").innerHTML=""

firebase.database().ref("messages/"+currentRoom).limitToLast(100).on("child_added",snap=>{

let m=snap.val()

firebase.database().ref("users/"+m.user).once("value",u=>{

let name=u.val().name

let div=document.createElement("div")
div.className="msg"

div.innerHTML="<b>"+name+"</b>: "+m.text

document.getElementById("messages").appendChild(div)

document.getElementById("messages").scrollTop=999999

})

})

}

function loadUsers(){

firebase.database().ref("users").on("value",snap=>{

let list=""

snap.forEach(u=>{

let data=u.val()

if(data.online){

list+="<div>"+data.name+"</div>"

}

})

document.getElementById("users").innerHTML=list

})

}

function loadRooms(){

let defaultRooms=["genel","oyun","sohbet"]

let html=""

defaultRooms.forEach(r=>{

html+="<div onclick='changeRoom(\""+r+"\")'># "+r+"</div>"

})

document.getElementById("rooms").innerHTML=html

}

function changeRoom(r){

currentRoom=r

document.getElementById("messages").innerHTML=""

loadMessages()

}

</script></body>
</html>
