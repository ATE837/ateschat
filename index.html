<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaChat - Gelişmiş Sürüm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Giriş Ekranı */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #2d2d3a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-container {
            background: #2f3136;
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .login-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #202225;
            padding: 4px;
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: #8e9297;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #5865f2;
            color: white;
        }

        .login-form {
            display: none;
        }

        .login-form.active {
            display: block;
        }

        .login-form h2 {
            text-align: center;
            color: #5865f2;
            margin-bottom: 20px;
        }

        .login-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #202225;
            border: none;
            border-radius: 6px;
            color: white;
            outline: none;
        }

        .login-submit {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
        }

        .error-message {
            color: #ed4245;
            margin-top: 10px;
            text-align: center;
        }

        /* Ana Uygulama - SABİT */
        .sidebar-left {
            width: 72px;
            background: #202225;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            height: 100vh;
            overflow-y: auto;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #36393f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
            color: #dcddde;
            font-weight: bold;
            position: relative;
        }

        .server-icon:hover {
            border-radius: 16px;
            background: #5865f2;
            color: white;
        }

        .server-icon.home {
            background: #5865f2;
            color: white;
        }

        .server-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ed4245;
            color: white;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 10px;
        }

        .dm-section {
            width: 100%;
            margin-top: 16px;
            flex: 1;
        }

        .dm-header {
            padding: 0 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            color: #8e9297;
        }

        .dm-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .dm-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 4px;
            margin: 2px 4px;
        }

        .dm-item:hover {
            background: #36393f;
        }

        .dm-item.active {
            background: #5865f2;
        }

        .dm-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .dm-info {
            flex: 1;
            overflow: hidden;
        }

        .dm-name {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
        }

        .dm-last-message {
            font-size: 12px;
            color: #8e9297;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-middle {
            width: 240px;
            background: #2f3136;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .channel-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-header h2 {
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-search {
            padding: 8px 16px;
            position: relative;
        }

        .channel-search input {
            width: 100%;
            padding: 8px 8px 8px 28px;
            background: #202225;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .channel-search i {
            position: absolute;
            left: 24px;
            top: 16px;
            color: #72767d;
        }

        .channel-categories {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .category {
            margin-bottom: 16px;
        }

        .category-header {
            padding: 4px 16px;
            display: flex;
            align-items: center;
            color: #8e9297;
            cursor: pointer;
        }

        .category-header span {
            flex: 1;
            font-size: 12px;
            text-transform: uppercase;
        }

        .channel-item {
            padding: 6px 16px 6px 32px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8e9297;
            cursor: pointer;
            border-radius: 4px;
            margin: 0 8px;
        }

        .channel-item:hover {
            background: #36393f;
            color: #dcddde;
        }

        .channel-item.active {
            background: #5865f2;
            color: white;
        }

        .user-info {
            padding: 12px 16px;
            background: #292b2f;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #202225;
        }

        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .user-details {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status {
            font-size: 12px;
        }

        .user-status.online { color: #3ba55d; }

        .chat-area {
            flex: 1;
            background: #36393f;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-info h3 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: #b9bbbe;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-icon:hover {
            background: #404249;
            color: white;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        .message:hover {
            background: #404249;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .message-author {
            font-weight: 600;
            margin-right: 8px;
        }

        .message-time {
            font-size: 12px;
            color: #8e9297;
        }

        .message-input-container {
            padding: 16px;
            background: #404249;
        }

        .message-input-wrapper {
            display: flex;
            align-items: center;
            background: #484b52;
            border-radius: 8px;
            padding: 4px 8px;
        }

        .message-input-wrapper input {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            color: white;
            outline: none;
        }

        .send-btn {
            color: #5865f2 !important;
        }

        .sidebar-right {
            width: 240px;
            background: #2f3136;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
        }

        .members-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .member-item:hover {
            background: #36393f;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .member-badge {
            margin-left: 4px;
            color: gold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2f3136;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #8e9297;
            font-size: 24px;
            cursor: pointer;
        }

        .profile-avatar {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #5865f2;
        }

        .info-row {
            margin-bottom: 12px;
        }

        .info-row label {
            display: block;
            color: #8e9297;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .info-value {
            background: #202225;
            padding: 8px 12px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }

        .btn-small {
            padding: 4px 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-results {
            margin-top: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .search-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-item:hover {
            background: #36393f;
        }

        .search-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Giriş</button>
                <button class="tab-btn" onclick="showTab('register')">Kayıt</button>
                <button class="tab-btn" onclick="showTab('admin')">Admin</button>
            </div>
            
            <div id="loginForm" class="login-form active">
                <h2>✨ NovaChat</h2>
                <input type="email" id="loginEmail" placeholder="E-posta">
                <input type="password" id="loginPassword" placeholder="Şifre">
                <button class="login-submit" onclick="login()">Giriş Yap</button>
                <div id="loginError" class="error-message"></div>
            </div>
            
            <div id="registerForm" class="login-form">
                <h2>📝 Kayıt Ol</h2>
                <input type="text" id="registerName" placeholder="Kullanıcı Adı">
                <input type="email" id="registerEmail" placeholder="E-posta">
                <input type="password" id="registerPassword" placeholder="Şifre">
                <input type="password" id="registerConfirm" placeholder="Şifre Tekrar">
                <button class="login-submit" onclick="register()">Kayıt Ol</button>
                <div id="registerError" class="error-message"></div>
            </div>
            
            <div id="adminForm" class="login-form">
                <h2>🔐 Admin Giriş</h2>
                <input type="password" id="adminPassword" placeholder="Admin Şifresi">
                <button class="login-submit" onclick="adminLogin()">Giriş</button>
                <div id="adminError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app" style="display: none;">
        <!-- SOL MENÜ -->
        <div class="sidebar-left">
            <div class="server-icon home" onclick="goHome()">
                <i class="fas fa-home"></i>
            </div>
            <div class="server-icon" onclick="createServer()">
                <i class="fas fa-plus"></i>
            </div>
            <div class="server-icon" onclick="discoverServers()">
                <i class="fas fa-compass"></i>
            </div>
            <div class="server-divider"></div>
            <div id="serverList"></div>
            
            <div class="dm-section">
                <div class="dm-header">
                    <span><i class="fas fa-comment"></i> DM</span>
                    <i class="fas fa-pen" onclick="newDM()"></i>
                </div>
                <div id="dmList" class="dm-list"></div>
            </div>
        </div>

        <!-- ORTA PANEL -->
        <div class="sidebar-middle">
            <div class="channel-header">
                <h2 id="currentServerName">Ana Sayfa</h2>
                <div>
                    <i class="fas fa-cog btn-icon" onclick="serverSettings()"></i>
                </div>
            </div>
            <div class="channel-search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Ara" id="searchInput" oninput="searchMessages()">
            </div>
            <div class="channel-categories">
                <div class="category">
                    <div class="category-header">
                        <i class="fas fa-chevron-down"></i>
                        <span>Metin Kanalları</span>
                        <i class="fas fa-plus" onclick="addChannel()"></i>
                    </div>
                    <div id="channelList"></div>
                </div>
                <div class="category">
                    <div class="category-header">
                        <i class="fas fa-chevron-down"></i>
                        <span>Ses Kanalları</span>
                    </div>
                    <div id="voiceChannelList"></div>
                </div>
            </div>
            <div class="user-info" id="userInfo">
                <img id="currentUserAvatar" src="https://via.placeholder.com/100">
                <div class="user-details">
                    <div class="user-name" id="currentUserName">Yükleniyor...</div>
                    <div class="user-status online" id="userStatus">🟢 Çevrimiçi</div>
                </div>
                <i class="fas fa-user btn-icon" onclick="openProfile()"></i>
            </div>
        </div>

        <!-- CHAT ALANI -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="channel-info">
                    <h3><i class="fas fa-hashtag"></i> <span id="currentChannelName">genel</span></h3>
                </div>
                <div class="chat-actions">
                    <i class="fas fa-phone btn-icon" onclick="startCall()"></i>
                    <i class="fas fa-video btn-icon" onclick="startVideoCall()"></i>
                    <i class="fas fa-microphone btn-icon" onclick="startVoiceMessage()"></i>
                    <i class="fas fa-user-plus btn-icon" onclick="addFriend()"></i>
                </div>
            </div>
            
            <div class="messages-container" id="messages"></div>
            
            <div class="message-input-container">
                <div class="message-input-wrapper">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <i class="fas fa-paper-plane send-btn btn-icon" onclick="sendMessage()"></i>
                </div>
            </div>
        </div>

        <!-- SAĞ PANEL -->
        <div class="sidebar-right">
            <div class="members-header">
                <h3>Üyeler</h3>
                <i class="fas fa-search btn-icon" onclick="searchMembers()"></i>
            </div>
            <div class="members-list" id="membersList"></div>
        </div>
    </div>

    <!-- PROFİL MODAL -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Profil</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('profileModal')"></i>
            </div>
            <div class="profile-avatar">
                <img id="modalAvatar" src="https://via.placeholder.com/100">
            </div>
            <div class="info-row">
                <label>Kullanıcı Adı</label>
                <div class="info-value">
                    <span id="modalName"></span>
                    <i class="fas fa-pen" onclick="editName()"></i>
                </div>
            </div>
            <div class="info-row">
                <label>E-posta</label>
                <span id="modalEmail"></span>
            </div>
            <div class="info-row">
                <label>Hakkında</label>
                <div class="info-value">
                    <span id="modalBio"></span>
                    <i class="fas fa-pen" onclick="editBio()"></i>
                </div>
            </div>
            <div class="info-row">
                <label>Durum</label>
                <select id="modalStatus" onchange="updateStatus()">
                    <option value="online">🟢 Çevrimiçi</option>
                    <option value="idle">🌙 Boşta</option>
                    <option value="dnd">⛔ Rahatsız Etme</option>
                </select>
            </div>
            <button class="login-submit" onclick="logout()" style="background:#ed4245;">Çıkış Yap</button>
        </div>
    </div>

    <!-- ARKADAŞ EKLE MODAL -->
    <div id="friendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Arkadaş Ekle</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('friendModal')"></i>
            </div>
            <input type="text" id="friendSearch" placeholder="Kullanıcı ara..." style="width:100%; padding:8px; margin-bottom:8px;">
            <div id="friendResults" class="search-results"></div>
        </div>
    </div>

    <!-- SUNUCU KEŞFET MODAL -->
    <div id="discoverModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Sunucu Keşfet</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('discoverModal')"></i>
            </div>
            <input type="text" id="discoverSearch" placeholder="Sunucu ara..." style="width:100%; padding:8px; margin-bottom:8px;">
            <div id="discoverResults" class="search-results"></div>
        </div>
    </div>

    <!-- YENİ DM MODAL -->
    <div id="dmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Yeni Mesaj</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('dmModal')"></i>
            </div>
            <input type="text" id="dmSearch" placeholder="Kullanıcı ara..." style="width:100%; padding:8px; margin-bottom:8px;">
            <div id="dmResults" class="search-results"></div>
        </div>
    </div>

    <!-- SUNUCU AYARLARI MODAL -->
    <div id="serverSettingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Sunucu Ayarları</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('serverSettingsModal')"></i>
            </div>
            <div class="info-row">
                <label>Sunucu Adı</label>
                <div class="info-value">
                    <span id="serverNameDisplay"></span>
                    <i class="fas fa-pen" onclick="editServerName()"></i>
                </div>
            </div>
            <div class="info-row">
                <label>Sunucu Kodu</label>
                <div class="info-value">
                    <span id="serverCode"></span>
                    <i class="fas fa-copy" onclick="copyServerCode()"></i>
                </div>
            </div>
            <h3>Üyeler</h3>
            <div id="serverMembersList" style="max-height:200px; overflow-y:auto; margin-bottom:16px;"></div>
            <button class="login-submit" onclick="deleteServer()" style="background:#ed4245;">Sunucuyu Sil</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
            authDomain: "ateschat-cd9f4.firebaseapp.com",
            projectId: "ateschat-cd9f4",
            storageBucket: "ateschat-cd9f4.firebasestorage.app",
            messagingSenderId: "174732212740",
            appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global Değişkenler
        let currentUser = null;
        let currentServer = null;
        let currentChannel = 'genel';
        let currentDM = null;
        let userRole = 'user'; // user, moderator, admin
        let servers = [];
        let messages = [];

        // Test verileri
        const testUsers = [
            { id: '1', name: 'Ateş', avatar: 'https://via.placeholder.com/100', status: 'online', role: 'admin' },
            { id: '2', name: 'Ayşe', avatar: 'https://via.placeholder.com/100', status: 'online', role: 'moderator' },
            { id: '3', name: 'Mehmet', avatar: 'https://via.placeholder.com/100', status: 'idle', role: 'user' }
        ];

        const testMessages = [
            { user: 'Ateş', text: 'Merhaba!', time: '12:34', avatar: 'https://via.placeholder.com/100' },
            { user: 'Ayşe', text: 'NovaChat süper!', time: '12:35', avatar: 'https://via.placeholder.com/100' },
            { user: 'Mehmet', text: 'Her şey çalışıyor', time: '12:36', avatar: 'https://via.placeholder.com/100' }
        ];

        // Auth Durumu
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('currentUserName').innerText = user.displayName || 'Kullanıcı';
                loadUserData();
                loadServers();
                loadDMList();
                loadMembers();
                loadMessages();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // Tab Geçiş
        window.showTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else if (tab === 'register') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
                document.getElementById('adminForm').classList.add('active');
            }
        };

        // Giriş
        window.login = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch(error => document.getElementById('loginError').innerText = error.message);
        };

        // Kayıt
        window.register = () => {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const pass = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            
            if (pass !== confirm) {
                document.getElementById('registerError').innerText = 'Şifreler eşleşmiyor';
                return;
            }
            
            auth.createUserWithEmailAndPassword(email, pass)
                .then(cred => {
                    cred.user.updateProfile({ displayName: name });
                    db.collection('users').doc(cred.user.uid).set({
                        name: name,
                        email: email,
                        avatar: 'https://via.placeholder.com/100',
                        bio: 'Merhaba!',
                        status: 'online',
                        friends: [],
                        role: 'user'
                    });
                })
                .catch(error => document.getElementById('registerError').innerText = error.message);
        };

        // Admin Giriş
        window.adminLogin = () => {
            const pass = document.getElementById('adminPassword').value;
            if (pass === 'NovaChat2024!') {
                auth.signInWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                    .catch(() => {
                        auth.createUserWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                            .then(cred => cred.user.updateProfile({ displayName: 'Admin' }));
                    });
            } else {
                document.getElementById('adminError').innerText = 'Hatalı şifre';
            }
        };

        // Kullanıcı Verileri
        async function loadUserData() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('currentUserName').innerText = data.name;
                document.getElementById('currentUserAvatar').src = data.avatar;
            }
        }

        // Sunucuları Yükle
        function loadServers() {
            const list = document.getElementById('serverList');
            list.innerHTML = '';
            
            // Test sunucuları
            const testServers = ['Genel', 'Oyun', 'Sohbet'];
            testServers.forEach((server, i) => {
                const div = document.createElement('div');
                div.className = 'server-icon';
                div.innerText = server.charAt(0);
                div.title = server;
                div.onclick = () => selectServer(server);
                list.appendChild(div);
            });
        }

        // Sunucu Seç
        function selectServer(server) {
            currentServer = server;
            document.getElementById('currentServerName').innerText = server;
            document.getElementById('channelList').innerHTML = `
                <div class="channel-item active"><i class="fas fa-hashtag"></i> genel</div>
                <div class="channel-item"><i class="fas fa-hashtag"></i> sohbet</div>
            `;
        }

        // DM Listesi
        function loadDMList() {
            const list = document.getElementById('dmList');
            list.innerHTML = '';
            
            testUsers.forEach(user => {
                if (user.name !== 'Ateş') {
                    const div = document.createElement('div');
                    div.className = 'dm-item';
                    div.innerHTML = `
                        <img src="${user.avatar}" class="dm-avatar">
                        <div class="dm-info">
                            <div class="dm-name">${user.name}</div>
                            <div class="dm-last-message">Son mesaj...</div>
                        </div>
                    `;
                    div.onclick = () => openDM(user);
                    list.appendChild(div);
                }
            });
        }

        // DM Aç
        function openDM(user) {
            currentDM = user;
            document.getElementById('currentServerName').innerText = user.name;
            document.getElementById('messages').innerHTML = testMessages.map(m => `
                <div class="message">
                    <img src="${m.avatar}" class="message-avatar">
                    <div>
                        <span class="message-author">${m.user}</span>
                        <span class="message-time">${m.time}</span>
                        <div>${m.text}</div>
                    </div>
                </div>
            `).join('');
        }

        // Yeni DM
        window.newDM = () => {
            document.getElementById('dmModal').classList.add('show');
            const results = document.getElementById('dmResults');
            results.innerHTML = testUsers.map(user => `
                <div class="search-item" onclick="startDM('${user.name}')">
                    <img src="${user.avatar}">
                    <span>${user.name}</span>
                </div>
            `).join('');
        };

        window.startDM = (name) => {
            alert(`${name} ile DM başlatılıyor`);
            closeModal('dmModal');
        };

        // Üyeleri Yükle
        function loadMembers() {
            const list = document.getElementById('membersList');
            list.innerHTML = testUsers.map(user => `
                <div class="member-item" onclick="openUserProfile('${user.name}')">
                    <img src="${user.avatar}" class="member-avatar">
                    <span class="member-name">${user.name}</span>
                    ${user.role === 'admin' ? '<i class="fas fa-crown member-badge"></i>' : ''}
                    ${user.role === 'moderator' ? '<i class="fas fa-shield member-badge"></i>' : ''}
                </div>
            `).join('');
        }

        // Mesajları Yükle
        function loadMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = testMessages.map(m => `
                <div class="message">
                    <img src="${m.avatar}" class="message-avatar">
                    <div>
                        <span class="message-author">${m.user}</span>
                        <span class="message-time">${m.time}</span>
                        <div>${m.text}</div>
                    </div>
                </div>
            `).join('');
        }

        // Mesaj Gönder
        window.sendMessage = () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text) {
                const container = document.getElementById('messages');
                container.innerHTML += `
                    <div class="message">
                        <img src="https://via.placeholder.com/100" class="message-avatar">
                        <div>
                            <span class="message-author">${currentUser?.displayName || 'Ben'}</span>
                            <span class="message-time">${new Date().toLocaleTimeString()}</span>
                            <div>${text}</div>
                        </div>
                    </div>
                `;
                input.value = '';
                container.scrollTop = container.scrollHeight;
            }
        };

        // Profil
        window.openProfile = () => {
            document.getElementById('modalName').innerText = currentUser?.displayName || 'Kullanıcı';
            document.getElementById('modalEmail').innerText = currentUser?.email || 'email@example.com';
            document.getElementById('modalBio').innerText = 'Merhaba! NovaChat kullanıyorum.';
            document.getElementById('modalAvatar').src = 'https://via.placeholder.com/100';
            document.getElementById('profileModal').classList.add('show');
        };

        window.editName = () => {
            const name = prompt('Yeni kullanıcı adı:');
            if (name) {
                document.getElementById('modalName').innerText = name;
                document.getElementById('currentUserName').innerText = name;
            }
        };

        window.editBio = () => {
            const bio = prompt('Yeni biyografi:');
            if (bio) document.getElementById('modalBio').innerText = bio;
        };

        window.updateStatus = () => {
            const status = document.getElementById('modalStatus').value;
            document.getElementById('userStatus').innerText = status === 'online' ? '🟢 Çevrimiçi' : status === 'idle' ? '🌙 Boşta' : '⛔ Rahatsız Etme';
        };

        // Arkadaş Ekle
        window.addFriend = () => {
            document.getElementById('friendModal').classList.add('show');
            const results = document.getElementById('friendResults');
            results.innerHTML = testUsers.map(user => `
                <div class="search-item" onclick="sendFriendRequest('${user.name}')">
                    <img src="${user.avatar}">
                    <span>${user.name}</span>
                </div>
            `).join('');
        };

        window.sendFriendRequest = (name) => {
            alert(`Arkadaşlık isteği ${name}'e gönderildi`);
            closeModal('friendModal');
        };

        // Sunucu Keşfet
        window.discoverServers = () => {
            document.getElementById('discoverModal').classList.add('show');
            const results = document.getElementById('discoverResults');
            results.innerHTML = `
                <div class="search-item">
                    <div style="width:32px; height:32px; border-radius:50%; background:#5865f2; display:flex; align-items:center; justify-content:center;">G</div>
                    <span>Genel Sohbet (1.2k üye)</span>
                </div>
                <div class="search-item">
                    <div style="width:32px; height:32px; border-radius:50%; background:#3ba55d; display:flex; align-items:center; justify-content:center;">O</div>
                    <span>Oyun Severler (856 üye)</span>
                </div>
            `;
        };

        // Sunucu Oluştur
        window.createServer = () => {
            const name = prompt('Sunucu adı:');
            if (name) {
                alert(`"${name}" sunucusu oluşturuldu!`);
                loadServers();
            }
        };

        // Kanal Ekle
        window.addChannel = () => {
            if (userRole === 'admin' || userRole === 'moderator') {
                const name = prompt('Kanal adı:');
                if (name) alert(`#${name} kanalı eklendi`);
            } else {
                alert('Bu işlem için yetkiniz yok!');
            }
        };

        // Sunucu Ayarları
        window.serverSettings = () => {
            document.getElementById('serverNameDisplay').innerText = currentServer || 'Ana Sayfa';
            document.getElementById('serverCode').innerText = 'ABC-123-XYZ';
            
            const members = document.getElementById('serverMembersList');
            members.innerHTML = testUsers.map(user => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:4px;">
                    <span>${user.name} (${user.role})</span>
                    ${userRole === 'admin' ? '<i class="fas fa-ban" style="color:#ed4245; cursor:pointer;" onclick="kickMember(\''+user.name+'\')"></i>' : ''}
                </div>
            `).join('');
            
            document.getElementById('serverSettingsModal').classList.add('show');
        };

        window.kickMember = (name) => {
            if (userRole === 'admin') {
                alert(`${name} sunucudan atıldı`);
            }
        };

        window.copyServerCode = () => {
            navigator.clipboard.writeText('ABC-123-XYZ');
            alert('Sunucu kodu kopyalandı!');
        };

        // Sesli Mesaj
        window.startVoiceMessage = () => {
            alert('Sesli mesaj kaydı başlatılıyor... (5 saniye)');
            setTimeout(() => alert('Sesli mesaj gönderildi!'), 5000);
        };

        // Arama
        window.startCall = () => alert('Sesli arama başlatılıyor...');
        window.startVideoCall = () => alert('Görüntülü arama başlatılıyor...');
        window.searchMessages = () => {};
        window.searchMembers = () => {};

        // Ana Sayfa
        window.goHome = () => {
            currentServer = null;
            currentDM = null;
            document.getElementById('currentServerName').innerText = 'Ana Sayfa';
            document.getElementById('currentChannelName').innerText = 'genel';
            loadMessages();
        };

        // Modal Kapat
        window.closeModal = (id) => {
            document.getElementById(id).classList.remove('show');
        };

        // Çıkış
        window.logout = () => {
            auth.signOut();
        };
    </script>
</body>
    </html>
