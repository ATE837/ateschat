<!DOCTYPE html>
<html>
<head>
<title>AteşChat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1f22;
color:white;
}

#login{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#5865F2;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

#app{
display:none;
height:100vh;
}

.servers{
width:70px;
background:#2b2d31;
height:100%;
float:left;
text-align:center;
padding-top:10px;
}

.server{
background:#404249;
margin:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.channels{
width:200px;
background:#313338;
height:100%;
float:left;
padding:10px;
}

.channel{
padding:8px;
cursor:pointer;
border-radius:5px;
}

.chat{
margin-left:270px;
margin-right:200px;
height:100%;
display:flex;
flex-direction:column;
}

.top{
background:#313338;
padding:10px;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
margin:8px 0;
background:#404249;
padding:8px;
border-radius:5px;
}

.send{
background:#313338;
padding:10px;
}

.users{
width:200px;
background:#2b2d31;
position:absolute;
right:0;
top:0;
bottom:0;
padding:10px;
}

.user{
padding:6px;
background:#404249;
margin:5px 0;
border-radius:5px;
cursor:pointer;
}

.admin{
color:#ff5555;
font-weight:bold;
}

#profilePopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#2b2d31;
padding:20px;
border-radius:10px;
display:none;
width:250px;
}

</style>

</head>

<body>

<div id="login">

<h1>🔥 AteşChat</h1>

<input id="user" placeholder="Kullanıcı adı"><br>
<input id="pass" type="password" placeholder="Şifre"><br>

<button onclick="login()">Giriş</button>

<p>
Admin: <b>Ateş Bey</b><br>
Şifre: <b>Ateş123</b>
</p>

</div>

<div id="app">

<div class="servers">
<div class="server">💬</div>
<div class="server">🎮</div>
<div class="server">🎵</div>
</div>

<div class="channels">

<h3>Kanallar</h3>

<div class="channel"># genel</div>

</div>

<div class="chat">

<div class="top"># genel</div>

<div class="messages" id="chatBox"></div>

<div class="send">

<input id="msg" placeholder="Mesaj yaz..." onkeypress="enterSend(event)">
<button onclick="send()">Gönder</button>

</div>

</div>

<div class="users">

<h3>Kullanıcılar</h3>

<div id="userList"></div>

</div>

</div>

<div id="profilePopup">

<h3 id="profileName"></h3>

<p id="profileRole"></p>
<p id="profileBio"></p>

<button onclick="startDM()">Mesaj Gönder</button>
<button onclick="closeProfile()">Kapat</button>

</div>

<script>

let users={
"Ateş Bey":{
password:"Ateş123",
role:"Admin",
bio:"AteşChat Kurucusu"
}
}

let currentUser=""
let selectedUser=""

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].password==p){

currentUser=u

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

loadUsers()

}else{

alert("Hatalı giriş")

}

}

function loadUsers(){

let list=document.getElementById("userList")

for(let u in users){

let div=document.createElement("div")

div.className="user"

if(users[u].role=="Admin"){

div.className+=" admin"

}

div.innerHTML=u

div.onclick=function(){

openProfile(u)

}

list.appendChild(div)

}

}

function openProfile(name){

selectedUser=name

document.getElementById("profileName").innerText=name
document.getElementById("profileRole").innerText="Rol: "+users[name].role
document.getElementById("profileBio").innerText="Bio: "+users[name].bio

document.getElementById("profilePopup").style.display="block"

}

function closeProfile(){

document.getElementById("profilePopup").style.display="none"

}

function startDM(){

alert("DM başlatıldı: "+currentUser+" → "+selectedUser)

closeProfile()

}

function send(){

let msg=document.getElementById("msg").value

if(msg=="") return

let chat=document.getElementById("chatBox")

chat.innerHTML += "<div class='msg'><b>"+currentUser+"</b>: "+msg+"</div>"

document.getElementById("msg").value=""

}

function enterSend(e){

if(e.key==="Enter"){

send()

}

}

</script>

</body>
</html>
