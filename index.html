<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AteşChat V7</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
gap:10px;
}

input{
padding:12px;
border-radius:10px;
border:none;
width:240px;
font-size:16px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
width:240px;
font-size:16px;
}

#chat{
display:none;
flex-direction:column;
height:100vh;
}

#topbar{
background:#1f1f1f;
padding:15px;
text-align:center;
font-size:20px;
}

#messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
background:#222;
padding:10px;
border-radius:12px;
margin:6px;
max-width:70%;
}

.me{
background:#ff3c3c;
margin-left:auto;
}

.time{
font-size:11px;
opacity:0.6;
margin-top:3px;
}

#sendbox{
display:flex;
padding:10px;
background:#1f1f1f;
}

#msgInput{
flex:1;
margin-right:5px;
}

</style>

</head>

<body>

<div id="login">

<h2>🔥 AteşChat V7</h2>

<input id="email" placeholder="Gmail veya admin">

<input id="password" type="password" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

</div>

<div id="chat">

<div id="topbar">
🔥 AteşChat V7
</div>

<div id="messages"></div>

<div id="sendbox">

<input id="msgInput" placeholder="Mesaj yaz...">

<button onclick="send()">Gönder</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",

authDomain: "ateschat-cd9f4.firebaseapp.com",

databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",

projectId: "ateschat-cd9f4",

storageBucket: "ateschat-cd9f4.firebasestorage.app",

messagingSenderId: "174732212740",

appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"

};

firebase.initializeApp(firebaseConfig);

let db = firebase.database();

let user = "";

let isAdmin = false;



function login(){

let email = document.getElementById("email").value;

let pass = document.getElementById("password").value;



if(email=="Ateş Bey" && pass=="AtesBey123"){

user="🔥 Ateş Bey (Admin)";

isAdmin=true;

startChat();

return;

}



if(email.includes("@gmail.com")){

user=email.split("@")[0];

startChat();

}else{

alert("Geçerli Gmail gir");

}

}



function startChat(){

document.getElementById("login").style.display="none";

document.getElementById("chat").style.display="flex";

loadMessages();

}



function send(){

let text=document.getElementById("msgInput").value;

if(text=="") return;



db.ref("messages").push({

user:user,

text:text,

time:Date.now()

});



document.getElementById("msgInput").value="";

}



function loadMessages(){

db.ref("messages").on("child_added",function(snap){

let data=snap.val();



let div=document.createElement("div");

div.className="msg";



if(data.user==user){

div.classList.add("me");

}



let date=new Date(data.time);

let time=date.getHours()+":"+("0"+date.getMinutes()).slice(-2);



div.innerHTML="<b>"+data.user+"</b><br>"+data.text+"<div class='time'>"+time+"</div>";



document.getElementById("messages").appendChild(div);



document.getElementById("messages").scrollTop=999999;

});

}



document.getElementById("msgInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){

send();

}

});

</script>

</body>
</html>
