<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateş Chat | Discord</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="auth-box">
        <h1>🔥 Ateş Chat</h1>
        <p>Sohbete katılmak için giriş yapın</p>
        <button id="google-login-btn" class="login-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" style="margin-right:10px;">
            Google ile Giriş Yap
        </button>
    </div>

    <div id="main-layout" class="hidden">
        <div id="messages-container" class="messages-area"></div>
        <form id="chat-form" class="input-area">
            <input type="text" id="message-input" placeholder="Mesaj gönder..." autocomplete="off">
        </form>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
