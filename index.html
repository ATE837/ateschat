<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateş Chat | Sohbetin Merkezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="auth-container" class="auth-box">
        <div class="auth-card">
            <h1 style="font-size: 56px; margin-bottom: 8px;">🔥</h1>
            <h1 class="auth-title">Ateş Chat</h1>
            <p class="auth-subtitle">Arkadaşlarınla buluşmanın en sıcak yolu.</p>
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login">Giriş Yap</button>
                <button class="tab-btn" id="tab-register">Kayıt Ol</button>
            </div>
            <div id="form-login">
                <input type="email" id="login-email" class="auth-input" placeholder="E-posta">
                <input type="password" id="login-password" class="auth-input" placeholder="Şifre">
                <button id="login-btn" class="auth-btn">Giriş Yap</button>
                <p id="login-error" class="auth-error"></p>
            </div>
            <div id="form-register" class="hidden">
                <input type="text" id="reg-name" class="auth-input" placeholder="Kullanıcı Adı">
                <input type="email" id="reg-email" class="auth-input" placeholder="E-posta">
                <input type="password" id="reg-password" class="auth-input" placeholder="Şifre (min. 6 karakter)">
                <button id="register-btn" class="auth-btn">Kayıt Ol</button>
                <p id="reg-error" class="auth-error"></p>
            </div>
        </div>
    </div>

    <!-- SUNUCU EKRANI (giriş sonrası ilk ekran) -->
    <div id="server-screen" class="hidden">
        <div class="server-screen-inner">
            <h2 class="server-screen-title">🔥 Ateş Chat'e Hoş Geldin!</h2>
            <p class="server-screen-sub">Bir sunucuya katıl ya da yeni bir sunucu oluştur.</p>
            <button id="create-server-btn" class="auth-btn" style="margin-bottom:12px;">+ Sunucu Oluştur</button>
            <button id="join-server-btn" class="auth-btn" style="background:#2b2d31; border: 1px solid #5865f2;">Sunucuya Katıl</button>
            <p id="server-screen-error" class="auth-error"></p>
        </div>
    </div>

    <!-- SUNUCU OLUŞTUR MODAL -->
