<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ateş Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="auth-box">
        <div class="auth-content">
            <h1>🔥 Ateş Chat</h1>
            <p>Global topluluğa katılmak için giriş yap.</p>
            <button id="google-login-btn" class="login-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="G" width="20">
                Google ile Devam Et
            </button>
        </div>
    </div>

    <div id="main-layout" class="hidden">
        <div class="sidebar">
            <div class="server-list">
                <div class="server-icon active">🔥</div>
            </div>
            <div class="channel-list">
                <h3>Ateş Chat Global</h3>
                <div class="channel active"># genel-sohbet</div>
                
                <div class="user-panel">
                    <img id="user-avatar" src="" alt="">
                    <div class="user-details">
                        <span id="user-name">Yükleniyor...</span>
                    </div>
                    <button id="logout-btn">Çıkış</button>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header"># genel-sohbet</div>
            <div id="messages-container" class="messages-container"></div>
            <form id="chat-form" class="message-input-container">
                <input type="text" id="message-input" placeholder="Mesaj gönder..." autocomplete="off">
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
