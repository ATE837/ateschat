<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onChildAdded, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
  authDomain: "ateschat-cd9f4.firebaseapp.com",
  databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
  projectId: "ateschat-cd9f4",
  storageBucket: "ateschat-cd9f4.firebasestorage.app",
  messagingSenderId: "174732212740",
  appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username = "";

window.login = function(){

username = document.getElementById("username").value;

if(username==="") return;

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

const userRef = ref(db,"onlineUsers/"+username);

set(userRef,true);

onDisconnect(userRef).remove();

}

window.sendMessage = function(){

const text = document.getElementById("messageInput").value;

if(text==="") return;

const msgRef = ref(db,"messages");

push(msgRef,{
user:username,
text:text
});

document.getElementById("messageInput").value="";

}

const messagesRef = ref(db,"messages");

onChildAdded(messagesRef,(data)=>{

const msg=data.val();

const div=document.createElement("div");

div.innerHTML="<b>"+msg.user+"</b>: "+msg.text;

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop=999999;

});

const usersRef = ref(db,"onlineUsers");

onChildAdded(usersRef,(data)=>{

const user=data.key;

const div=document.createElement("div");

div.id="user-"+user;

div.innerText=user;

document.getElementById("userList").appendChild(div);

});

</script>
