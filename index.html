<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AteşChat v2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#1e1f22;
color:white;
height:100vh;
display:flex;
}

/* SERVER BAR */

.serverBar{
width:70px;
background:#111214;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
gap:10px;
}

.server{
width:50px;
height:50px;
background:#2b2d31;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
transition:0.2s;
}

.server:hover{
background:#5865f2;
}

/* CHANNEL BAR */

.channelBar{
width:220px;
background:#2b2d31;
padding:15px;
}

.channelTitle{
font-size:18px;
font-weight:bold;
margin-bottom:20px;
}

.channel{
padding:8px;
border-radius:6px;
cursor:pointer;
color:#b5bac1;
}

.channel:hover{
background:#404249;
color:white;
}

/* CHAT */

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.chatHeader{
height:55px;
background:#313338;
display:flex;
align-items:center;
padding-left:20px;
font-weight:bold;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin-bottom:12px;
}

.username{
color:#5865f2;
font-weight:bold;
}

.inputArea{
height:70px;
background:#313338;
display:flex;
align-items:center;
padding:10px;
gap:10px;
}

.inputArea input{
flex:1;
height:40px;
border:none;
border-radius:8px;
padding-left:10px;
background:#1e1f22;
color:white;
}

.inputArea button{
height:40px;
padding:0 20px;
border:none;
border-radius:8px;
background:#5865f2;
color:white;
cursor:pointer;
}

/* LOGIN */

.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1e1f22;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
}

.login input{
width:220px;
height:40px;
border:none;
border-radius:8px;
padding-left:10px;
}

.login button{
height:40px;
padding:0 20px;
border:none;
border-radius:8px;
background:#5865f2;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SERVER BAR -->

<div class="serverBar">

<div class="server">🔥</div>
<div class="server">+</div>

</div>

<!-- CHANNEL BAR -->

<div class="channelBar">

<div class="channelTitle">AteşChat</div>

<div class="channel"># genel</div>
<div class="channel"># sohbet</div>
<div class="channel"># oyun</div>

</div>

<!-- CHAT -->

<div class="chat">

<div class="chatHeader">
# genel
</div>

<div id="messages" class="messages"></div>

<div class="inputArea">
<input id="messageInput" placeholder="Mesaj yaz...">
<button onclick="sendMessage()">Gönder</button>
</div>

</div>

<!-- LOGIN -->

<div class="login" id="login">

<h2>🔥 AteşChat</h2>

<input id="usernameInput" placeholder="Kullanıcı adı">

<button onclick="login()">Giriş</button>

</div>

<script>

let username="";

function login(){

const input=document.getElementById("usernameInput");

if(input.value.trim()=="") return;

username=input.value;

document.getElementById("login").style.display="none";

}

function sendMessage(){

const input=document.getElementById("messageInput");

if(input.value.trim()=="") return;

const messages=document.getElementById("messages");

const div=document.createElement("div");

div.className="message";

div.innerHTML="<span class='username'>"+username+":</span> "+input.value;

messages.appendChild(div);

input.value="";

messages.scrollTop=messages.scrollHeight;

}

</script>

</body>
</html>
