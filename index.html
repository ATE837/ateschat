<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaChat - Tam Sürüm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ===== TEMEL STİLLER ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #dcddde;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* ===== SOL SUNUCU LİSTESİ ===== */
        .servers {
            width: 72px;
            background: #202225;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #36393f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            color: #dcddde;
            font-size: 20px;
            position: relative;
        }

        .server-icon:hover {
            border-radius: 16px;
            background: #5865f2;
            color: white;
        }

        .server-icon.home {
            background: #5865f2;
            color: white;
        }

        .server-divider {
            width: 32px;
            height: 2px;
            background: #36393f;
            margin: 8px 0;
        }

        /* ===== KANAL LİSTESİ ===== */
        .channels {
            width: 240px;
            background: #2f3136;
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
        }

        .channels-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
        }

        .channels-header h2 {
            font-size: 16px;
            color: white;
            font-weight: 600;
        }

        .channels-search {
            padding: 8px 16px;
        }

        .channels-search input {
            width: 100%;
            padding: 6px 8px;
            background: #202225;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .category {
            margin-bottom: 16px;
        }

        .category-title {
            padding: 4px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #8e9297;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
        }

        .category-title i {
            font-size: 10px;
        }

        .channel-item {
            padding: 6px 16px 6px 32px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8e9297;
            cursor: pointer;
            border-radius: 4px;
            margin: 0 8px;
            font-size: 14px;
        }

        .channel-item:hover {
            background: #36393f;
            color: #dcddde;
        }

        .channel-item.active {
            background: #404249;
            color: white;
        }

        .channel-item i {
            font-size: 18px;
            width: 20px;
        }

        .channel-count {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }

        .channel-count .online { color: #3ba55d; }
        .channel-count .idle { color: #faa81a; }
        .channel-count .dnd { color: #ed4245; }

        /* ===== KULLANICI PANELİ ===== */
        .user-panel {
            padding: 8px 16px;
            background: #292b2f;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #202225;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 500;
            font-size: 14px;
            color: white;
        }

        .user-status {
            font-size: 12px;
            color: #3ba55d;
        }

        .user-actions {
            display: flex;
            gap: 8px;
        }

        .user-actions i {
            color: #b9bbbe;
            cursor: pointer;
            padding: 4px;
        }

        .user-actions i:hover {
            color: white;
        }

        /* ===== CHAT ALANI ===== */
        .chat {
            flex: 1;
            background: #36393f;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header i {
            color: #8e9297;
            font-size: 20px;
        }

        .chat-header h3 {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-actions {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        .chat-actions i {
            font-size: 18px;
            cursor: pointer;
        }

        .chat-actions i:hover {
            color: white;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
            padding: 4px 0;
            margin-bottom: 4px;
        }

        .message:hover {
            background: #404249;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 500;
            color: white;
        }

        .message-time {
            font-size: 12px;
            color: #8e9297;
        }

        .message-text {
            color: #dcddde;
        }

        .message-reactions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }

        .reaction {
            background: #2f3136;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .reaction:hover {
            background: #404249;
        }

        .message-input {
            padding: 16px;
            background: #404249;
            margin: 16px;
            border-radius: 8px;
        }

        .message-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #404249;
        }

        .message-input-wrapper input {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            color: white;
            outline: none;
        }

        .message-input-wrapper i {
            color: #b9bbbe;
            cursor: pointer;
            font-size: 18px;
        }

        .message-input-wrapper i:hover {
            color: white;
        }

        .send-btn {
            color: #5865f2 !important;
        }

        /* ===== SAĞ ÜYE LİSTESİ ===== */
        .members {
            width: 240px;
            background: #2f3136;
            padding: 16px;
            border-left: 1px solid #202225;
            overflow-y: auto;
            height: 100vh;
            flex-shrink: 0;
        }

        .members-header {
            color: #8e9297;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .member-item:hover {
            background: #36393f;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: white;
            font-weight: bold;
            position: relative;
        }

        .member-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid #2f3136;
        }

        .status-online { background: #3ba55d; }
        .status-idle { background: #faa81a; }
        .status-dnd { background: #ed4245; }

        .member-name {
            flex: 1;
            font-size: 14px;
        }

        .member-badge {
            color: #f0b232;
            margin-left: 4px;
        }

        /* ===== GİRİŞ EKRANI ===== */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 8px;
            width: 400px;
        }

        .login-box h1 {
            text-align: center;
            color: #5865f2;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #202225;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .login-box button:hover {
            background: #4752c4;
        }

        .error {
            color: #ed4245;
            text-align: center;
            margin-top: 8px;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2f3136;
            border-radius: 8px;
            width: 400px;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: white;
            font-size: 20px;
        }

        .close-modal {
            color: #b9bbbe;
            cursor: pointer;
            font-size: 20px;
        }

        .close-modal:hover {
            color: white;
        }

        .modal-body input, .modal-body textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            background: #202225;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .modal-body button {
            width: 100%;
            padding: 8px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .members { display: none; }
        }
    </style>
</head>
<body>
    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>NovaChat</h1>
            <input type="email" id="loginEmail" placeholder="E-posta">
            <input type="password" id="loginPassword" placeholder="Şifre">
            <button onclick="login()">Giriş Yap</button>
            <button onclick="register()">Kayıt Ol</button>
            <button onclick="adminLogin()" style="background:#ed4245;">Admin Giriş</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app" style="display: none;">
        <!-- SOL SUNUCU LİSTESİ -->
        <div class="servers">
            <div class="server-icon home" onclick="goHome()">
                <i class="fas fa-home"></i>
            </div>
            <div class="server-icon" onclick="showCreateServer()">
                <i class="fas fa-plus"></i>
            </div>
            <div class="server-divider"></div>
            <div id="serverList"></div>
        </div>

        <!-- KANAL LİSTESİ -->
        <div class="channels">
            <div class="channels-header">
                <h2 id="serverName">Ana Sayfa</h2>
            </div>
            <div class="channels-search">
                <input type="text" id="searchInput" placeholder="Ara (Ctrl+K)">
            </div>
            <div class="channels-list">
                <div class="category">
                    <div class="category-title">
                        <span><i class="fas fa-chevron-down"></i> METİN KANALLARI</span>
                        <i class="fas fa-plus" onclick="showAddChannel()"></i>
                    </div>
                    <div id="textChannels">
                        <div class="channel-item active" onclick="selectChannel('genel')">
                            <i class="fas fa-hashtag"></i> genel
                        </div>
                        <div class="channel-item" onclick="selectChannel('sohbet')">
                            <i class="fas fa-hashtag"></i> sohbet
                        </div>
                        <div class="channel-item" onclick="selectChannel('duyuru')">
                            <i class="fas fa-bullhorn"></i> duyuru
                        </div>
                    </div>
                </div>
                <div class="category">
                    <div class="category-title">
                        <span><i class="fas fa-chevron-down"></i> SES KANALLARI</span>
                        <i class="fas fa-plus" onclick="showAddVoiceChannel()"></i>
                    </div>
                    <div id="voiceChannels">
                        <div class="channel-item" onclick="joinVoice('Genel Sohbet')">
                            <i class="fas fa-volume-up"></i> Genel Sohbet
                            <span class="channel-count">
                                <span class="online">●</span>
                                <span>3</span>
                            </span>
                        </div>
                        <div class="channel-item" onclick="joinVoice('Oyun Odası')">
                            <i class="fas fa-volume-up"></i> Oyun Odası
                            <span class="channel-count">
                                <span class="online">●</span>
                                <span>2</span>
                            </span>
                        </div>
                        <div class="channel-item" onclick="joinVoice('Müzik')">
                            <i class="fas fa-volume-up"></i> Müzik
                            <span class="channel-count">
                                <span class="idle">●</span>
                                <span>1</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="user-panel" onclick="showProfile()">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Yükleniyor...</div>
                    <div class="user-status" id="userStatus">Çevrimiçi</div>
                </div>
                <div class="user-actions">
                    <i class="fas fa-microphone" onclick="toggleMute(); event.stopPropagation();"></i>
                    <i class="fas fa-headphones" onclick="toggleDeafen(); event.stopPropagation();"></i>
                    <i class="fas fa-cog" onclick="showSettings(); event.stopPropagation();"></i>
                </div>
            </div>
        </div>

        <!-- CHAT ALANI -->
        <div class="chat">
            <div class="chat-header">
                <i class="fas fa-hashtag"></i>
                <h3 id="channelName">genel</h3>
                <div class="chat-actions">
                    <i class="fas fa-phone" onclick="startVoiceCall()"></i>
                    <i class="fas fa-video" onclick="startVideoCall()"></i>
                    <i class="fas fa-user-plus" onclick="showAddFriend()"></i>
                    <i class="fas fa-search" onclick="showSearch()"></i>
                    <i class="fas fa-bell" onclick="showNotifications()"></i>
                    <i class="fas fa-pin" onclick="showPinned()"></i>
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="message-input">
                <div class="message-input-wrapper">
                    <i class="fas fa-plus-circle" onclick="attachFile()"></i>
                    <input type="text" id="messageInput" placeholder="Mesaj #genel" onkeydown="if(event.key==='Enter') sendMessage()">
                    <i class="fas fa-smile" onclick="toggleEmoji()"></i>
                    <i class="fas fa-paper-plane send-btn" onclick="sendMessage()"></i>
                </div>
            </div>
        </div>

        <!-- SAĞ ÜYE LİSTESİ -->
        <div class="members">
            <div class="members-header">ÜYELER — <span id="memberCount">0</span></div>
            <div id="membersList"></div>
        </div>
    </div>

    <!-- PROFİL MODAL -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Profil</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('profileModal')"></i>
            </div>
            <div class="modal-body">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div class="user-avatar" style="width: 80px; height: 80px; margin: 0 auto; font-size: 32px;" id="modalAvatar">A</div>
                </div>
                <input type="text" id="profileName" placeholder="Kullanıcı adı">
                <textarea id="profileBio" placeholder="Hakkında" rows="3"></textarea>
                <select id="profileStatus">
                    <option value="online">Çevrimiçi</option>
                    <option value="idle">Boşta</option>
                    <option value="dnd">Rahatsız Etme</option>
                </select>
                <button onclick="saveProfile()">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- ARKADAŞ EKLE MODAL -->
    <div id="friendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Arkadaş Ekle</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('friendModal')"></i>
            </div>
            <div class="modal-body">
                <input type="text" id="friendEmail" placeholder="E-posta">
                <button onclick="sendFriendRequest()">İstek Gönder</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <script>
        // ===== FIREBASE KONFİG =====
        const firebaseConfig = {
            apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
            authDomain: "ateschat-cd9f4.firebaseapp.com",
            projectId: "ateschat-cd9f4",
            storageBucket: "ateschat-cd9f4.firebasestorage.app",
            messagingSenderId: "174732212740",
            appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ===== GLOBAL DEĞİŞKENLER =====
        let currentUser = null;
        let currentChannel = 'genel';
        let messages = [];
        let friends = [];
        let muted = false;
        let deafened = false;
        let localStream = null;
        let peerConnection = null;

        // ===== AUTH =====
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                
                document.getElementById('userName').innerText = user.displayName || 'Kullanıcı';
                document.getElementById('userAvatar').innerText = (user.displayName || 'K')[0].toUpperCase();
                document.getElementById('modalAvatar').innerText = (user.displayName || 'K')[0].toUpperCase();
                
                await loadUserData();
                loadMessages();
                loadMembers();
                loadFriends();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // ===== GİRİŞ İŞLEMLERİ =====
        window.login = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch(e => document.getElementById('loginError').innerText = e.message);
        };

        window.register = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .then(cred => cred.user.updateProfile({ displayName: 'Kullanıcı' }))
                .catch(e => document.getElementById('loginError').innerText = e.message);
        };

        window.adminLogin = () => {
            const pass = document.getElementById('loginPassword').value;
            if (pass === 'NovaChat2024!') {
                auth.signInWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                    .catch(() => {
                        auth.createUserWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                            .then(cred => cred.user.updateProfile({ displayName: 'Admin' }));
                    });
            } else {
                document.getElementById('loginError').innerText = 'Hatalı şifre';
            }
        };

        // ===== KULLANICI VERİLERİ =====
        async function loadUserData() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (!doc.exists) {
                await db.collection('users').doc(currentUser.uid).set({
                    name: currentUser.displayName,
                    email: currentUser.email,
                    bio: 'Merhaba! NovaChat kullanıyorum.',
                    status: 'online',
                    friends: [],
                    createdAt: new Date()
                });
            }
        }

        // ===== MESAJLAŞMA =====
        function loadMessages() {
            const container = document.getElementById('messages');
            
            db.collection('messages')
                .where('channel', '==', currentChannel)
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    container.innerHTML = '';
                    
                    if (snapshot.empty) {
                        container.innerHTML = '<div style="text-align:center; color:#8e9297; margin-top:50px;">Hoş geldin! İlk mesajı sen yaz ✨</div>';
                        return;
                    }
                    
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const time = msg.timestamp ? new Date(msg.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                        
                        container.innerHTML += `
                            <div class="message" id="msg-${doc.id}">
                                <div class="message-avatar">${msg.senderName ? msg.senderName[0] : '?'}</div>
                                <div class="message-content">
                                    <div class="message-header">
                                        <span class="message-author">${msg.senderName || 'Bilinmeyen'}</span>
                                        <span class="message-time">${time}</span>
                                    </div>
                                    <div class="message-text">${msg.content}</div>
                                    <div class="message-reactions" id="reactions-${doc.id}">
                                        ${msg.reactions ? Object.entries(msg.reactions).map(([emoji, users]) => 
                                            `<span class="reaction" onclick="addReaction('${doc.id}', '${emoji}')">${emoji} ${users.length}</span>`
                                        ).join('') : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    container.scrollTop = container.scrollHeight;
                });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser) return;
            
            await db.collection('messages').add({
                senderId: currentUser.uid,
                senderName: currentUser.displayName,
                content: text,
                channel: currentChannel,
                timestamp: new Date(),
                reactions: {}
            });
            
            input.value = '';
        };

        window.addReaction = async (messageId, emoji) => {
            const msgRef = db.collection('messages').doc(messageId);
            const msg = await msgRef.get();
            const reactions = msg.data().reactions || {};
            
            if (!reactions[emoji]) reactions[emoji] = [];
            
            if (reactions[emoji].includes(currentUser.uid)) {
                reactions[emoji] = reactions[emoji].filter(id => id !== currentUser.uid);
                if (reactions[emoji].length === 0) delete reactions[emoji];
            } else {
                reactions[emoji].push(currentUser.uid);
            }
            
            await msgRef.update({ reactions });
        };

        // ===== ÜYE LİSTESİ =====
        function loadMembers() {
            db.collection('users').onSnapshot((snapshot) => {
                const list = document.getElementById('membersList');
                list.innerHTML = '';
                
                snapshot.forEach(doc => {
                    const user = doc.data();
                    if (user.uid === currentUser?.uid) return;
                    
                    list.innerHTML += `
                        <div class="member-item" onclick="showUserProfile('${user.uid}')">
                            <div class="member-avatar" style="position:relative;">
                                ${user.name ? user.name[0] : '?'}
                                <span class="member-status status-${user.status || 'online'}"></span>
                            </div>
                            <span class="member-name">${user.name || 'İsimsiz'}</span>
                            ${user.badges?.includes('admin') ? '<i class="fas fa-crown member-badge"></i>' : ''}
                        </div>
                    `;
                });
                
                document.getElementById('memberCount').innerText = snapshot.size;
            });
        }

        // ===== PROFİL =====
        window.showProfile = () => {
            document.getElementById('profileName').value = currentUser.displayName;
            document.getElementById('profileBio').value = 'Merhaba! NovaChat kullanıyorum.';
            document.getElementById('profileModal').classList.add('show');
        };

        window.saveProfile = async () => {
            const name = document.getElementById('profileName').value;
            const bio = document.getElementById('profileBio').value;
            const status = document.getElementById('profileStatus').value;
            
            await currentUser.updateProfile({ displayName: name });
            await db.collection('users').doc(currentUser.uid).update({
                name: name,
                bio: bio,
                status: status
            });
            
            document.getElementById('userName').innerText = name;
            document.getElementById('userAvatar').innerText = name[0].toUpperCase();
            document.getElementById('userStatus').innerText = status === 'online' ? 'Çevrimiçi' : status === 'idle' ? 'Boşta' : 'Rahatsız Etme';
            
            closeModal('profileModal');
        };

        // ===== ARKADAŞLIK =====
        window.showAddFriend = () => {
            document.getElementById('friendModal').classList.add('show');
        };

        window.sendFriendRequest = async () => {
            const email = document.getElementById('friendEmail').value;
            const users = await db.collection('users').where('email', '==', email).get();
            
            if (users.empty) {
                alert('Kullanıcı bulunamadı!');
                return;
            }
            
            const targetUser = users.docs[0].data();
            
            await db.collection('friendRequests').add({
                from: currentUser.uid,
                fromName: currentUser.displayName,
                to: targetUser.uid,
                status: 'pending',
                timestamp: new Date()
            });
            
            alert('Arkadaşlık isteği gönderildi!');
            closeModal('friendModal');
        };

        async function loadFriends() {
            const requests = await db.collection('friendRequests')
                .where('to', '==', currentUser.uid)
                .where('status', '==', 'pending')
                .get();
            
            if (!requests.empty) {
                // Bildirim göster
                console.log('Arkadaşlık istekleri var');
            }
        }

        // ===== GERÇEK SESLİ ARAMA =====
        window.startVoiceCall = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                peerConnection = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                alert('Sesli arama başlatıldı! (WebRTC aktif)');
                
            } catch (error) {
                alert('Mikrofon erişimi gerekli!');
            }
        };

        window.startVideoCall = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                alert('Görüntülü arama başlatıldı!');
            } catch (error) {
                alert('Kamera erişimi gerekli!');
            }
        };

        // ===== DOSYA PAYLAŞIMI =====
        window.attachFile = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,video/*,.pdf';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const storageRef = storage.ref();
                const fileRef = storageRef.child(`files/${Date.now()}_${file.name}`);
                await fileRef.put(file);
                const url = await fileRef.getDownloadURL();
                
                document.getElementById('messageInput').value = `[Dosya] ${url}`;
            };
            input.click();
        };

        // ===== EMOJİ =====
        window.toggleEmoji = () => {
            const emojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','❤️','👍','🎉','✨'];
            const random = emojis[Math.floor(Math.random() * emojis.length)];
            document.getElementById('messageInput').value += random;
        };

        // ===== DURUM =====
        window.toggleMute = () => {
            muted = !muted;
            document.querySelector('.fa-microphone').style.color = muted ? '#ed4245' : '#b9bbbe';
        };

        window.toggleDeafen = () => {
            deafened = !deafened;
            document.querySelector('.fa-headphones').style.color = deafened ? '#ed4245' : '#b9bbbe';
            if (deafened) document.querySelector('.fa-microphone').style.color = '#ed4245';
        };

        // ===== KANAL İŞLEMLERİ =====
        window.selectChannel = (channel) => {
            currentChannel = channel;
            document.getElementById('channelName').innerText = channel;
            loadMessages();
        };

        window.joinVoice = (channel) => {
            startVoiceCall();
        };

        window.goHome = () => {
            document.getElementById('serverName').innerText = 'Ana Sayfa';
            document.getElementById('channelName').innerText = 'genel';
            currentChannel = 'genel';
            loadMessages();
        };

        window.showCreateServer = () => {
            alert('Sunucu oluşturma özelliği yakında!');
        };

        window.showAddChannel = () => {
            alert('Kanal ekleme yetkiniz yok!');
        };

        window.showAddVoiceChannel = () => {
            alert('Ses kanalı ekleme yetkiniz yok!');
        };

        // ===== MODAL =====
        window.closeModal = (id) => {
            document.getElementById(id).classList.remove('show');
        };

        // ===== DİĞER =====
        window.showSearch = () => alert('Arama yakında!');
        window.showNotifications = () => alert('Bildirimler');
        window.showPinned = () => alert('Sabitlenmiş mesajlar');
        window.showUserProfile = (id) => alert('Kullanıcı profili');
    </script>
</body>
    </html>
