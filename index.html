<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AteşChat V26 GOD MODE 🔥</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->

<div id="login">

<h1>AteşChat 🔥</h1>

<input id="username" placeholder="Kullanıcı adı">
<input id="password" type="password" placeholder="Şifre">
<input id="photo" placeholder="Profil foto linki">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

<div id="error"></div>

</div>


<!-- APP -->

<div id="app">

<div id="sidebar">

<h2>Odalar</h2>

<div onclick="openRoom('global')">🌍 Global</div>
<div onclick="openRoom('sohbet')">💬 Sohbet</div>
<div onclick="openRoom('gaming')">🎮 Gaming</div>

<h2>Kullanıcılar</h2>

<div id="users"></div>

</div>


<div id="chat">

<div id="top">

<div id="roomName">Global</div>

<button onclick="logout()">Çıkış</button>

</div>

<div id="messages"></div>

<div id="sendArea">

<input id="messageInput" placeholder="Mesaj yaz">

<button onclick="openEmoji()">😀</button>

<button onclick="send()">Gönder</button>

</div>

</div>

</div>


<!-- EMOJI PANEL -->

<div id="emojiPanel">

<span onclick="addEmoji('😀')">😀</span>
<span onclick="addEmoji('😂')">😂</span>
<span onclick="addEmoji('🔥')">🔥</span>
<span onclick="addEmoji('❤️')">❤️</span>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="auth.js"></script>
<script src="chat.js"></script>
<script src="dm.js"></script>
<script src="admin.js"></script>
<script src="emoji.js"></script>

</body>

</html>
