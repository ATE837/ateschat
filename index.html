<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateş Chat | Sohbetin Merkezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="auth-container" class="auth-box">
        <div style="text-align: center;">
            <h1 style="font-size: 64px; margin-bottom: 10px;">🔥</h1>
            <h1 style="color: white; margin-bottom: 8px; font-size: 32px;">Ateş Chat</h1>
            <p style="color: #b5bac1; margin-bottom: 30px;">Arkadaşlarınla buluşmanın en sıcak yolu.</p>
            
            <button id="google-login-btn" class="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" style="margin-right:10px;">
                Google ile Giriş Yap
            </button>
        </div>
    </div>

    <!-- ANA EKRAN -->
    <div id="main-layout" class="hidden">

        <!-- ÜST BAR -->
        <div id="top-bar">
            <span id="top-bar-title">🔥 Ateş Chat</span>
            <div id="user-info">
                <img id="user-avatar" src="" alt="avatar">
                <span id="user-name"></span>
                <button id="logout-btn">Çıkış Yap</button>
            </div>
        </div>

        <!-- MESAJLAR -->
        <div id="messages-container"></div>

        <!-- MESAJ GİRİŞ ALANI -->
        <div class="input-area">
            <form id="chat-form">
                <input type="text" id="message-input" placeholder="Ateş Chat'e mesaj gönder..." autocomplete="off">
                <button type="submit" id="send-btn">Gönder</button>
            </form>
        </div>

    </div>
