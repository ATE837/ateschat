<!DOCTYPE html>
<html>
<head>

<title>AteşChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1f22;
color:white;
display:flex;
height:100vh;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
}

button{
padding:8px 14px;
background:#5865F2;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#app{
display:none;
width:100%;
height:100%;
display:flex;
}

.servers{
width:80px;
background:#2b2d31;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
overflow-y:auto;
}

.server{
background:#404249;
margin:6px 0;
padding:12px;
border-radius:10px;
cursor:pointer;
font-size:14px;
text-align:center;
}

.channels{
width:180px;
background:#313338;
padding:10px;
}

.channel{
padding:6px;
margin:5px 0;
border-radius:5px;
cursor:pointer;
}

.channel:hover{
background:#404249;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.top{
background:#313338;
padding:10px;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
background:#404249;
padding:8px;
border-radius:6px;
margin:6px 0;
}

.send{
display:flex;
padding:10px;
background:#313338;
}

.send input{
flex:1;
margin-right:6px;
}

.users{
width:160px;
background:#2b2d31;
padding:10px;
}

.user{
background:#404249;
padding:6px;
margin:5px 0;
border-radius:6px;
}

@media(max-width:800px){

.channels{
display:none;
}

.users{
display:none;
}

}

</style>

</head>

<body>

<div id="login">

<h2>🔥 AteşChat</h2>

<input id="user" placeholder="Kullanıcı adı"><br>
<input id="pass" type="password" placeholder="Şifre"><br>

<button onclick="login()">Giriş</button>

<p>
Admin: Ateş Bey<br>
Şifre: Ateş123
</p>

</div>

<div id="app">

<div class="servers" id="serverList">

<div class="server" onclick="openServer('Genel')">💬</div>
<div class="server" onclick="openServer('Oyun')">🎮</div>
<div class="server" onclick="openServer('Müzik')">🎵</div>

<hr style="width:60%;opacity:0.3">

<div id="privateServers"></div>

<div class="server" onclick="createServer()">+</div>

</div>

<div class="channels">

<h3>Kanallar</h3>

<div class="channel"># genel</div>

</div>

<div class="chat">

<div class="top" id="roomName">Genel</div>

<div class="messages" id="chatBox"></div>

<div class="send">

<input id="msg" placeholder="Mesaj yaz..." onkeypress="enterSend(event)">
<button onclick="send()">Gönder</button>

</div>

</div>

<div class="users">

<h3>Kullanıcılar</h3>

<div class="user">👑 Ateş Bey</div>

</div>

</div>

<script>

let currentUser=""
let currentServer="Genel"

let chats={
Genel:[],
Oyun:[],
Müzik:[]
}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="Ateş Bey" && p=="Ateş123"){

currentUser=u

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="flex"

}else{

alert("Hatalı giriş")

}

}

function openServer(name){

currentServer=name

document.getElementById("roomName").innerText=name

renderMessages()

}

function renderMessages(){

let box=document.getElementById("chatBox")

box.innerHTML=""

if(!chats[currentServer]) chats[currentServer]=[]

chats[currentServer].forEach(m=>{

box.innerHTML+=`<div class="msg"><b>${m.user}</b>: ${m.text}</div>`

})

}

function send(){

let msg=document.getElementById("msg").value

if(msg=="") return

if(!chats[currentServer]) chats[currentServer]=[]

chats[currentServer].push({
user:currentUser,
text:msg
})

document.getElementById("msg").value=""

renderMessages()

}

function enterSend(e){

if(e.key==="Enter") send()

}

function createServer(){

let name=prompt("Sunucu adı")

if(!name) return

let code=Math.random().toString(36).substring(2,7).toUpperCase()

alert("Sunucu oluşturuldu!\nDavet kodu: "+code)

let div=document.createElement("div")

div.className="server"

div.innerText="🔥"

div.onclick=function(){

openServer(name)

}

document.getElementById("privateServers").appendChild(div)

chats[name]=[]

}

</script>

</body>
</html>
