<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateş Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- GİRİŞ EKRANI -->
<div id="auth-container">
    <div class="auth-card">
        <div class="auth-logo">🔥</div>
        <h1 class="auth-title">Ateş Chat</h1>
        <p class="auth-subtitle">Arkadaşlarınla buluşmanın en sıcak yolu.</p>
        <div class="auth-tabs">
            <button id="tab-login" class="tab-btn active" onclick="showTab('login')">Giriş Yap</button>
            <button id="tab-register" class="tab-btn" onclick="showTab('register')">Kayıt Ol</button>
        </div>
        <div id="form-login">
            <input type="email" id="login-email" class="auth-input" placeholder="E-posta">
            <input type="password" id="login-password" class="auth-input" placeholder="Şifre">
            <button class="auth-btn" onclick="doLogin()">Giriş Yap</button>
            <p id="login-error" class="auth-error"></p>
        </div>
        <div id="form-register" style="display:none">
            <input type="text" id="reg-name" class="auth-input" placeholder="Kullanıcı Adı">
            <input type="email" id="reg-email" class="auth-input" placeholder="E-posta">
            <input type="password" id="reg-password" class="auth-input" placeholder="Şifre (min. 6 karakter)">
            <button class="auth-btn" onclick="doRegister()">Kayıt Ol</button>
            <p id="reg-error" class="auth-error"></p>
        </div>
    </div>
</div>

<!-- SUNUCU SEÇİM EKRANI -->
<div id="server-screen" style="display:none">
    <div class="auth-card">
        <div class="auth-logo">🔥</div>
        <h2 class="auth-title">Hoş Geldin!</h2>
        <p class="auth-subtitle">Bir sunucuya katıl veya yeni oluştur.</p>
        <button class="auth-btn" style="margin-bottom:10px" onclick="showModal('modal-create')">+ Sunucu Oluştur</button>
        <button class="auth-btn secondary" onclick="showModal('modal-join')">Sunucuya Katıl</button>
    </div>
</div>

<!-- ANA LAYOUT -->
<div id="main-layout" style="display:none">

    <!-- SOL: SUNUCU LİSTESİ -->
    <div id="server-list">
        <div id="server-icons"></div>
        <button class="add-server-btn" onclick="showServerScreen()" title="Sunucu Ekle">+</button>
    </div>

    <!-- SOL: KANAL LİSTESİ -->
    <div id="channel-list">
        <div id="channel-list-header">
            <span id="channel-server-name">Sunucu</span>
        </div>
        <div id="channels"></div>
        <button class="add-channel-btn" onclick="showModal('modal-add-channel')">+ Kanal Ekle</button>
        <div id="channel-user-bar">
            <div class="user-avatar-small" id="my-avatar">?</div>
            <span id="my-name">Kullanıcı</span>
            <button class="photo-btn" onclick="openAvatarPicker()" title="Fotoğraf değiştir">📷</button>
            <button class="logout-btn" onclick="doLogout()" title="Çıkış">⬅</button>
        </div>
    </div>

    <!-- ORTA: MESAJLAR -->
    <div id="chat-area">
        <div id="chat-header">
            <span id="channel-title"># genel</span>
            <div id="header-buttons">
                <button class="call-btn voice" onclick="startCall('voice')" title="Sesli Arama">📞</button>
                <button class="call-btn video" onclick="startCall('video')" title="Görüntülü Arama">📹</button>
                <button class="invite-btn" onclick="showInvite()">🔗 Davet</button>
            </div>
        </div>
        <div id="messages"></div>
        <div id="chat-input-wrap">
            <input type="text" id="msg-input" placeholder="Mesaj gönder..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <!-- SAĞ: ÜYELER -->
    <div id="members-panel">
        <div class="members-title">Üyeler</div>
        <div id="members-list"></div>
    </div>

</div>

<!-- ARAMA EKRANI -->
<div id="call-screen" style="display:none">
    <div id="call-videos">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
    </div>
    <div id="call-info">
        <div id="call-status">Bağlanıyor...</div>
    </div>
    <div id="call-controls">
        <button class="ctrl-btn mute" onclick="toggleMute()" id="mute-btn">🎤</button>
        <button class="ctrl-btn hangup" onclick="endCall()">📵</button>
        <button class="ctrl-btn cam" onclick="toggleCam()" id="cam-btn">📹</button>
    </div>
</div>

<!-- GELEN ARAMA -->
<div id="incoming-call" style="display:none">
    <div class="incoming-box">
        <div class="incoming-avatar" id="caller-avatar">?</div>
        <div id="caller-name">Arıyor...</div>
        <div id="caller-type"></div>
        <div class="incoming-btns">
            <button class="accept-btn" onclick="acceptCall()">✅ Kabul Et</button>
            <button class="reject-btn" onclick="rejectCall()">❌ Reddet</button>
        </div>
    </div>
</div>

<!-- MODAL: SUNUCU OLUŞTUR -->
<div id="modal-create" class="modal" style="display:none">
    <div class="modal-box">
        <h3>Sunucu Oluştur</h3>
        <input type="text" id="new-server-name" class="auth-input" placeholder="Sunucu adı">
        <button class="auth-btn" onclick="createServer()">Oluştur</button>
        <button class="modal-cancel" onclick="hideModal('modal-create')">İptal</button>
        <p id="create-error" class="auth-error"></p>
    </div>
</div>

<!-- MODAL: SUNUCUYA KATIL -->
<div id="modal-join" class="modal" style="display:none">
    <div class="modal-box">
        <h3>Sunucuya Katıl</h3>
        <input type="text" id="join-code" class="auth-input" placeholder="Davet kodu">
        <button class="auth-btn" onclick="joinServer()">Katıl</button>
        <button class="modal-cancel" onclick="hideModal('modal-join')">İptal</button>
        <p id="join-error" class="auth-error"></p>
    </div>
</div>

<!-- MODAL: KANAL EKLE -->
<div id="modal-add-channel" class="modal" style="display:none">
    <div class="modal-box">
        <h3>Kanal Ekle</h3>
        <input type="text" id="new-channel-name" class="auth-input" placeholder="Kanal adı (örn: oyun)">
        <button class="auth-btn" onclick="addChannel()">Oluştur</button>
        <button class="modal-cancel" onclick="hideModal('modal-add-channel')">İptal</button>
        <p id="channel-error" class="auth-error"></p>
    </div>
</div>

<!-- MODAL: DAVET KODU -->
<div id="modal-invite" class="modal" style="display:none">
    <div class="modal-box">
        <h3>Davet Kodu</h3>
        <p style="color:#949ba4;font-size:13px;margin-bottom:12px">Arkadaşlarınla paylaş</p>
        <div id="invite-code" class="invite-code-box"></div>
        <button class="auth-btn" style="margin-top:12px" onclick="copyInvite()">Kopyala</button>
        <button class="modal-cancel" onclick="hideModal('modal-invite')">Kapat</button>
    </div>
</div>

<input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="onAvatarSelected(this)">
<script type="module" src="app.js"></script>
</body>
</html>
