<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AteşChat</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f0f0f;
color:white;
}

#login{
display:flex;
flex-direction:column;
gap:10px;
padding:40px;
}

#login input{
padding:10px;
font-size:16px;
}

#login button{
padding:12px;
border:none;
background:orange;
color:white;
font-weight:bold;
}

#app{
display:none;
height:100vh;
flex-direction:column;
}

#header{
background:#1a1a1a;
padding:15px;
display:flex;
justify-content:space-between;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
padding:6px;
border-bottom:1px solid #222;
}

#sendBox{
display:flex;
padding:10px;
background:#1a1a1a;
}

#sendBox input{
flex:1;
padding:10px;
}

#sendBox button{
padding:10px;
background:orange;
border:none;
color:white;
}

</style>
</head>

<body>

<div id="login">

<h2>AteşChat 🔥</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>

<div id="app">

<div id="header">
<span>Genel Sohbet</span>
<button onclick="logout()">Çıkış</button>
</div>

<div id="messages"></div>

<div id="sendBox">
<input id="msgInput" placeholder="Mesaj yaz">
<button onclick="send()">Gönder</button>
</div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
  authDomain: "ateschat-cd9f4.firebaseapp.com",
  databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
  projectId: "ateschat-cd9f4",
  storageBucket: "ateschat-cd9f4.firebasestorage.app",
  messagingSenderId: "174732212740",
  appId: "1:174732212740:web:dcd4b60ed7cc380ca95351",
  measurementId: "G-1CBZNR0W3E"
};

firebase.initializeApp(firebaseConfig);


function register(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

firebase.auth().createUserWithEmailAndPassword(email,pass)

}

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,pass)

}

function logout(){

firebase.auth().signOut()

}


firebase.auth().onAuthStateChanged(function(user){

if(user){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="flex"

startChat()

}else{

document.getElementById("login").style.display="flex"
document.getElementById("app").style.display="none"

}

})


function send(){

let text=document.getElementById("msgInput").value

if(text=="") return

let user=firebase.auth().currentUser.email

firebase.database().ref("messages").push({

user:user,
text:text,
time:Date.now()

})

document.getElementById("msgInput").value=""

}


function startChat(){

firebase.database().ref("messages").on("child_added",function(s){

let d=s.val()

let div=document.createElement("div")
div.className="msg"

div.innerHTML="<b>"+d.user+"</b>: "+d.text

document.getElementById("messages").appendChild(div)

})

}

</script>

</body>
</html>
