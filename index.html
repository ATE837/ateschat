<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AteşChat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#36393f;
color:white;
display:flex;
height:100vh;
}

#servers{
width:80px;
background:#202225;
padding:10px;
}

#rooms{
width:200px;
background:#2f3136;
padding:10px;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

#inputArea{
display:flex;
background:#40444b;
padding:10px;
}

#input{
flex:1;
padding:10px;
border:none;
outline:none;
background:#303339;
color:white;
}

button{
background:#5865f2;
color:white;
border:none;
padding:10px;
margin-left:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="servers">
<button onclick="createServer()">+</button>
</div>

<div id="rooms">
<h3>Odalar</h3>
<div id="roomList"></div>
<button onclick="createRoom()">+ Oda</button>
</div>

<div id="chat">

<div id="messages"></div>

<div id="inputArea">
<input id="input" placeholder="Mesaj yaz...">
<button onclick="sendMessage()">Gönder</button>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain: "ateschat-cd9f4.firebaseapp.com",
databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId: "ateschat-cd9f4",
storageBucket: "ateschat-cd9f4.firebasestorage.app",
messagingSenderId: "174732212740",
appId: "1:174732212740:web:dcd4b60ed7cc380ca95351",
measurementId: "G-1CBZNR0W3E"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");

window.sendMessage = function(){

let input = document.getElementById("input");
let text = input.value;

if(text=="") return;

push(messagesRef,{
user:"Ateş",
text:text,
time:Date.now()
});

input.value="";

}

onChildAdded(messagesRef,(data)=>{

let msg=data.val();

let div=document.createElement("div");

div.innerHTML="<b>"+msg.user+":</b> "+msg.text;

document.getElementById("messages").appendChild(div);

});

window.createServer=function(){

alert("Sunucu sistemi yakında eklenecek");

}

window.createRoom=function(){

alert("Oda sistemi yakında eklenecek");

}

</script>

</body>
</html>
