<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChat - Gerçek Sürüm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sol Sidebar */
        .sidebar-left {
            width: 72px;
            background: #202225;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            height: 100vh;
            overflow-y: auto;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #36393f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
            color: #dcddde;
            font-weight: bold;
        }

        .server-icon:hover {
            border-radius: 16px;
            background: #5865f2;
            color: white;
        }

        .server-icon.home {
            background: #5865f2;
            color: white;
        }

        .dm-section {
            width: 100%;
            margin-top: 16px;
        }

        .dm-header {
            padding: 0 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            color: #8e9297;
            font-size: 12px;
        }

        .dm-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .dm-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .dm-item:hover {
            background: #36393f;
        }

        .dm-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .dm-name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Orta Panel */
        .sidebar-middle {
            width: 240px;
            background: #2f3136;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .channel-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
        }

        .channel-header h2 {
            font-size: 16px;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .channel-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8e9297;
        }

        .channel-item:hover {
            background: #36393f;
            color: white;
        }

        .channel-item.active {
            background: #5865f2;
            color: white;
        }

        .user-info {
            padding: 12px 16px;
            background: #292b2f;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #202225;
        }

        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 500;
            font-size: 14px;
        }

        .user-status {
            font-size: 12px;
            color: #3ba55d;
        }

        /* Chat Alanı */
        .chat-area {
            flex: 1;
            background: #36393f;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid #202225;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: #b9bbbe;
            cursor: pointer;
        }

        .btn-icon:hover {
            background: #404249;
            color: white;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        .message:hover {
            background: #404249;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .message-author {
            font-weight: 600;
            margin-right: 8px;
        }

        .message-time {
            font-size: 12px;
            color: #8e9297;
        }

        .message-input-container {
            padding: 16px;
            background: #404249;
        }

        .message-input-wrapper {
            display: flex;
            align-items: center;
            background: #484b52;
            border-radius: 8px;
            padding: 4px 8px;
        }

        .message-input-wrapper input {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            color: white;
            outline: none;
        }

        .send-btn {
            color: #5865f2 !important;
        }

        /* Sağ Panel */
        .sidebar-right {
            width: 240px;
            background: #2f3136;
            padding: 16px;
            height: 100vh;
            overflow-y: auto;
        }

        .members-header {
            margin-bottom: 16px;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .member-item:hover {
            background: #36393f;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* Giriş Ekranı */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #2f3136);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-container {
            background: #2f3136;
            padding: 40px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .login-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #202225;
            padding: 4px;
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: #8e9297;
            cursor: pointer;
            border-radius: 6px;
        }

        .tab-btn.active {
            background: #5865f2;
            color: white;
        }

        .login-form {
            display: none;
        }

        .login-form.active {
            display: block;
        }

        .login-form h2 {
            text-align: center;
            color: #5865f2;
            margin-bottom: 20px;
        }

        .login-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #202225;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .login-submit {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
        }

        .error-message {
            color: #ed4245;
            margin-top: 10px;
            text-align: center;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2f3136;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #8e9297;
            font-size: 24px;
            cursor: pointer;
        }

        .profile-avatar {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #5865f2;
        }

        .info-row {
            margin-bottom: 12px;
        }

        .info-row label {
            display: block;
            color: #8e9297;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .info-value {
            background: #202225;
            padding: 8px 12px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }

        .btn-small {
            padding: 4px 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
        }

        .search-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-item:hover {
            background: #36393f;
        }

        .search-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Giriş</button>
                <button class="tab-btn" onclick="showTab('register')">Kayıt</button>
                <button class="tab-btn" onclick="showTab('admin')">Admin</button>
            </div>
            
            <div id="loginForm" class="login-form active">
                <h2>✨ NovaChat</h2>
                <input type="email" id="loginEmail" placeholder="E-posta">
                <input type="password" id="loginPassword" placeholder="Şifre">
                <button class="login-submit" onclick="login()">Giriş Yap</button>
                <div id="loginError" class="error-message"></div>
            </div>
            
            <div id="registerForm" class="login-form">
                <h2>📝 Kayıt Ol</h2>
                <input type="text" id="registerName" placeholder="Kullanıcı Adı">
                <input type="email" id="registerEmail" placeholder="E-posta">
                <input type="password" id="registerPassword" placeholder="Şifre">
                <input type="password" id="registerConfirm" placeholder="Şifre Tekrar">
                <button class="login-submit" onclick="register()">Kayıt Ol</button>
                <div id="registerError" class="error-message"></div>
            </div>
            
            <div id="adminForm" class="login-form">
                <h2>🔐 Admin</h2>
                <input type="password" id="adminPassword" placeholder="Admin Şifresi">
                <button class="login-submit" onclick="adminLogin()">Giriş</button>
                <div id="adminError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app" style="display: none;">
        <!-- SOL MENÜ -->
        <div class="sidebar-left">
            <div class="server-icon home" onclick="goHome()">
                <i class="fas fa-home"></i>
            </div>
            <div class="server-icon" onclick="createServer()">
                <i class="fas fa-plus"></i>
            </div>
            <div class="server-icon" onclick="discoverServers()">
                <i class="fas fa-compass"></i>
            </div>
            <div style="width:32px; height:2px; background:#36393f; margin:8px 0;"></div>
            <div id="serverList"></div>
            
            <div class="dm-section">
                <div class="dm-header">
                    <span><i class="fas fa-comment"></i> DM</span>
                    <i class="fas fa-pen" onclick="newDM()"></i>
                </div>
                <div id="dmList" class="dm-list"></div>
            </div>
        </div>

        <!-- ORTA PANEL -->
        <div class="sidebar-middle">
            <div class="channel-header">
                <h2 id="currentServerName">Ana Sayfa</h2>
            </div>
            <div class="channel-list" id="channelList">
                <div class="channel-item active" onclick="selectChannel('genel')">
                    <i class="fas fa-hashtag"></i> genel
                </div>
            </div>
            <div class="user-info">
                <img id="currentUserAvatar" src="https://via.placeholder.com/100">
                <div class="user-details">
                    <div class="user-name" id="currentUserName">Yükleniyor...</div>
                    <div class="user-status">🟢 Çevrimiçi</div>
                </div>
                <i class="fas fa-user btn-icon" onclick="openProfile()"></i>
            </div>
        </div>

        <!-- CHAT ALANI -->
        <div class="chat-area">
            <div class="chat-header">
                <div>
                    <h3 id="currentChannelName"><i class="fas fa-hashtag"></i> genel</h3>
                </div>
                <div class="chat-actions">
                    <i class="fas fa-phone btn-icon" onclick="startCall()"></i>
                    <i class="fas fa-video btn-icon" onclick="startVideoCall()"></i>
                    <i class="fas fa-user-plus btn-icon" onclick="addFriend()"></i>
                </div>
            </div>
            
            <div class="messages-container" id="messages"></div>
            
            <div class="message-input-container">
                <div class="message-input-wrapper">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <i class="fas fa-paper-plane send-btn btn-icon" onclick="sendMessage()"></i>
                </div>
            </div>
        </div>

        <!-- SAĞ PANEL -->
        <div class="sidebar-right">
            <div class="members-header">
                <h3>Üyeler</h3>
            </div>
            <div id="membersList"></div>
        </div>
    </div>

    <!-- PROFİL MODAL -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Profil</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('profileModal')"></i>
            </div>
            <div class="profile-avatar">
                <img id="modalAvatar" src="https://via.placeholder.com/100">
            </div>
            <div class="info-row">
                <label>Kullanıcı Adı</label>
                <div class="info-value">
                    <span id="modalName"></span>
                    <i class="fas fa-pen" onclick="editName()"></i>
                </div>
            </div>
            <div class="info-row">
                <label>E-posta</label>
                <span id="modalEmail"></span>
            </div>
            <div class="info-row">
                <label>Hakkında</label>
                <div class="info-value">
                    <span id="modalBio"></span>
                    <i class="fas fa-pen" onclick="editBio()"></i>
                </div>
            </div>
            <button class="login-submit" onclick="logout()" style="background:#ed4245;">Çıkış Yap</button>
        </div>
    </div>

    <!-- ARKADAŞ EKLE MODAL -->
    <div id="friendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Arkadaş Ekle</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('friendModal')"></i>
            </div>
            <input type="text" id="friendSearch" placeholder="Kullanıcı ara..." style="width:100%; padding:8px; margin-bottom:8px;" oninput="searchUsers()">
            <div id="friendResults" class="search-results"></div>
        </div>
    </div>

    <!-- YENİ DM MODAL -->
    <div id="dmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Yeni Mesaj</h2>
                <i class="fas fa-times close-modal" onclick="closeModal('dmModal')"></i>
            </div>
            <input type="text" id="dmSearch" placeholder="Kullanıcı ara..." style="width:100%; padding:8px; margin-bottom:8px;" oninput="searchDMs()">
            <div id="dmResults" class="search-results"></div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
            authDomain: "ateschat-cd9f4.firebaseapp.com",
            projectId: "ateschat-cd9f4",
            storageBucket: "ateschat-cd9f4.firebasestorage.app",
            messagingSenderId: "174732212740",
            appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"
        };

        // Firebase'i başlat
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global değişkenler
        let currentUser = null;
        let currentServer = 'genel';
        let currentChannel = 'genel';
        let currentDM = null;
        let allUsers = [];

        // Auth durumunu dinle
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                
                // Kullanıcı bilgilerini göster
                document.getElementById('currentUserName').innerText = user.displayName || 'Kullanıcı';
                document.getElementById('currentUserAvatar').src = user.photoURL || 'https://via.placeholder.com/100';
                
                // Kullanıcıyı Firestore'a kaydet
                await saveUserToFirestore(user);
                
                // Verileri yükle
                loadUsers();
                loadMessages();
                loadDMList();
                loadMembers();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // Kullanıcıyı Firestore'a kaydet
        async function saveUserToFirestore(user) {
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            
            if (!doc.exists) {
                await userRef.set({
                    uid: user.uid,
                    name: user.displayName || 'Kullanıcı',
                    email: user.email,
                    avatar: user.photoURL || 'https://via.placeholder.com/100',
                    bio: 'Merhaba! NovaChat kullanıyorum.',
                    status: 'online',
                    friends: [],
                    createdAt: new Date()
                });
            }
        }

        // Tüm kullanıcıları yükle
        async function loadUsers() {
            const snapshot = await db.collection('users').get();
            allUsers = [];
            snapshot.forEach(doc => allUsers.push(doc.data()));
        }

        // Tab geçiş
        window.showTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else if (tab === 'register') {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[2].classList.add('active');
                document.getElementById('adminForm').classList.add('active');
            }
        };

        // Giriş
        window.login = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            
            auth.signInWithEmailAndPassword(email, pass)
                .catch(error => {
                    document.getElementById('loginError').innerText = error.message;
                });
        };

        // Kayıt
        window.register = () => {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const pass = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            
            if (!name || !email || !pass) {
                document.getElementById('registerError').innerText = 'Tüm alanları doldurun';
                return;
            }
            
            if (pass !== confirm) {
                document.getElementById('registerError').innerText = 'Şifreler eşleşmiyor';
                return;
            }
            
            auth.createUserWithEmailAndPassword(email, pass)
                .then(cred => {
                    return cred.user.updateProfile({
                        displayName: name
                    });
                })
                .catch(error => {
                    document.getElementById('registerError').innerText = error.message;
                });
        };

        // Admin giriş
        window.adminLogin = () => {
            const pass = document.getElementById('adminPassword').value;
            
            if (pass === 'NovaChat2024!') {
                auth.signInWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                    .catch(() => {
                        auth.createUserWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                            .then(cred => cred.user.updateProfile({ displayName: 'Admin' }));
                    });
            } else {
                document.getElementById('adminError').innerText = 'Hatalı şifre';
            }
        };

        // MESAJLAŞMA
        async function loadMessages() {
            if (!currentUser) return;
            
            const messagesRef = db.collection('messages')
                .where('channel', '==', currentChannel)
                .orderBy('timestamp', 'asc');
            
            messagesRef.onSnapshot((snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                
                if (snapshot.empty) {
                    container.innerHTML = '<div style="text-align:center; color:#72767d; margin-top:50px;">Hoş geldin! İlk mesajı sen yaz ✨</div>';
                    return;
                }
                
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const time = msg.timestamp ? new Date(msg.timestamp.seconds * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                    
                    container.innerHTML += `
                        <div class="message">
                            <img src="${msg.avatar}" class="message-avatar" onerror="this.src='https://via.placeholder.com/100'">
                            <div>
                                <span class="message-author">${msg.name}</span>
                                <span class="message-time">${time}</span>
                                <div>${msg.text}</div>
                            </div>
                        </div>
                    `;
                });
                
                container.scrollTop = container.scrollHeight;
            });
        }

        // Mesaj gönder
        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser) return;
            
            await db.collection('messages').add({
                name: currentUser.displayName || 'Kullanıcı',
                avatar: currentUser.photoURL || 'https://via.placeholder.com/100',
                text: text,
                channel: currentChannel,
                timestamp: new Date(),
                uid: currentUser.uid
            });
            
            input.value = '';
        };

        // Kanal seç
        window.selectChannel = (channel) => {
            currentChannel = channel;
            document.getElementById('currentChannelName').innerHTML = `<i class="fas fa-hashtag"></i> ${channel}`;
            loadMessages();
        };

        // PROFİL
        window.openProfile = async () => {
            const userRef = db.collection('users').doc(currentUser.uid);
            const doc = await userRef.get();
            const user = doc.data();
            
            document.getElementById('modalName').innerText = user.name;
            document.getElementById('modalEmail').innerText = user.email;
            document.getElementById('modalBio').innerText = user.bio;
            document.getElementById('modalAvatar').src = user.avatar;
            
            document.getElementById('profileModal').classList.add('show');
        };

        window.editName = () => {
            const name = prompt('Yeni kullanıcı adı:');
            if (name) {
                currentUser.updateProfile({ displayName: name });
                db.collection('users').doc(currentUser.uid).update({ name: name });
                document.getElementById('modalName').innerText = name;
                document.getElementById('currentUserName').innerText = name;
            }
        };

        window.editBio = () => {
            const bio = prompt('Yeni biyografi:');
            if (bio) {
                db.collection('users').doc(currentUser.uid).update({ bio: bio });
                document.getElementById('modalBio').innerText = bio;
            }
        };

        // ARKADAŞLIK
        window.addFriend = () => {
            document.getElementById('friendModal').classList.add('show');
            searchUsers();
        };

        window.searchUsers = async () => {
            const search = document.getElementById('friendSearch').value.toLowerCase();
            const results = document.getElementById('friendResults');
            
            if (!search) {
                results.innerHTML = '';
                return;
            }
            
            const snapshot = await db.collection('users').get();
            results.innerHTML = '';
            
            snapshot.forEach(doc => {
                const user = doc.data();
                if (user.uid !== currentUser.uid && user.name.toLowerCase().includes(search)) {
                    results.innerHTML += `
                        <div class="search-item" onclick="sendFriendRequest('${user.uid}')">
                            <img src="${user.avatar}">
                            <span>${user.name}</span>
                        </div>
                    `;
                }
            });
        };

        window.sendFriendRequest = async (uid) => {
            await db.collection('friendRequests').add({
                from: currentUser.uid,
                to: uid,
                status: 'pending',
                timestamp: new Date()
            });
            
            alert('Arkadaşlık isteği gönderildi!');
            closeModal('friendModal');
        };

        // DM
        window.newDM = () => {
            document.getElementById('dmModal').classList.add('show');
            searchDMs();
        };

        window.searchDMs = async () => {
            const search = document.getElementById('dmSearch').value.toLowerCase();
            const results = document.getElementById('dmResults');
            
            const snapshot = await db.collection('users').get();
            results.innerHTML = '';
            
            snapshot.forEach(doc => {
                const user = doc.data();
                if (user.uid !== currentUser.uid && (!search || user.name.toLowerCase().includes(search))) {
                    results.innerHTML += `
                        <div class="search-item" onclick="startDM('${user.uid}', '${user.name}', '${user.avatar}')">
                            <img src="${user.avatar}">
                            <span>${user.name}</span>
                        </div>
                    `;
                }
            });
        };

        window.startDM = (uid, name, avatar) => {
            alert(`${name} ile DM başlatılıyor...`);
            closeModal('dmModal');
        };

        // DM listesini yükle
        function loadDMList() {
            const list = document.getElementById('dmList');
            list.innerHTML = '<div style="color:#72767d; padding:8px;">DM başlatmak için + butonuna tıkla</div>';
        }

        // Üye listesini yükle
        async function loadMembers() {
            const list = document.getElementById('membersList');
            const snapshot = await db.collection('users').get();
            
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const user = doc.data();
                list.innerHTML += `
                    <div class="member-item" onclick="openUserProfile('${user.uid}')">
                        <img src="${user.avatar}" class="member-avatar">
                        <span>${user.name}</span>
                    </div>
                `;
            });
        }

        // Sunucu oluştur
        window.createServer = () => {
            alert('Sunucu oluşturma özelliği aktif!');
        };

        // Sunucu keşfet
        window.discoverServers = () => {
            alert('Sunucu keşfet özelliği aktif!');
        };

        // Arama
        window.startCall = () => alert('Sesli arama başlatılıyor...');
        window.startVideoCall = () => alert('Görüntülü arama başlatılıyor...');
        
        // Ana sayfa
        window.goHome = () => {
            currentServer = null;
            currentChannel = 'genel';
            document.getElementById('currentServerName').innerText = 'Ana Sayfa';
            document.getElementById('currentChannelName').innerHTML = '<i class="fas fa-hashtag"></i> genel';
            loadMessages();
        };

        // Modal kapat
        window.closeModal = (id) => {
            document.getElementById(id).classList.remove('show');
        };

        // Çıkış
        window.logout = () => {
            auth.signOut();
        };
    </script>
</body>
                                                                                   </html>
