<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AteşChat</title>

<style>
body{
margin:0;
font-family:Arial;
background:#2f3136;
color:white;
}

#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
width:220px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
background:#5865F2;
color:white;
width:150px;
}

#chat{
display:none;
height:100vh;
}

#left{
width:200px;
background:#202225;
padding:10px;
float:left;
height:100%;
}

#chatbox{
margin-left:200px;
height:90%;
overflow:auto;
padding:10px;
}

#msg{
position:fixed;
bottom:0;
left:200px;
width:calc(100% - 200px);
display:flex;
}

#msg input{
flex:1;
}

.message{
margin:5px 0;
}

.user{
color:#43b581;
font-weight:bold;
}

</style>

</head>
<body>

<div id="login">

<h1>AteşChat</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>


<div id="chat">

<div id="left">

<h3>Odalar</h3>

<div># genel</div>

</div>

<div id="chatbox"></div>

<div id="msg">
<input id="messageInput" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>
</div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script>

const firebaseConfig = {
apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain: "ateschat-cd9f4.firebaseapp.com",
databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId: "ateschat-cd9f4",
storageBucket: "ateschat-cd9f4.firebasestorage.app",
messagingSenderId: "174732212740",
appId: "1:174732212740:web:9a8a298eca9b3313a95351",
measurementId: "G-Z9GCVW4105"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();



function register(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,pass)
.then(()=>{
alert("Kayıt başarılı");
})
.catch(e=>alert(e.message));

}



function login(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="block";
loadMessages();
})
.catch(e=>alert(e.message));

}



function send(){

let text=document.getElementById("messageInput").value;

if(text=="")return;

let user=auth.currentUser.email;

db.ref("messages").push({
user:user,
text:text,
time:Date.now()
});

document.getElementById("messageInput").value="";

}



function loadMessages(){

db.ref("messages").on("child_added",snap=>{

let m=snap.val();

let div=document.createElement("div");
div.className="message";

div.innerHTML="<span class='user'>"+m.user+"</span>: "+m.text;

document.getElementById("chatbox").appendChild(div);

});

}

</script>

</body>
</html>
