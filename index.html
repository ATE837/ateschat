<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AteşChat V21 🔥</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

h1{
font-size:40px;
}

#login{
display:flex;
flex-direction:column;
align-items:center;
margin-top:120px;
gap:15px;
}

input{
padding:16px;
border-radius:10px;
border:none;
width:80%;
font-size:18px;
}

button{
padding:16px;
border:none;
border-radius:10px;
background:#ff6a00;
color:white;
font-weight:bold;
width:80%;
font-size:18px;
}

#chat{
display:none;
height:100vh;
}

#top{
background:#1a1a1a;
padding:15px;
display:flex;
justify-content:space-between;
font-size:18px;
}

#messages{
height:70vh;
overflow:auto;
padding:15px;
}

.msg{
margin:10px 0;
padding:14px;
background:#1e1e1e;
border-radius:10px;
font-size:18px;
}

#sendArea{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
padding:10px;
}

#messageInput{
flex:1;
font-size:18px;
}

</style>
</head>

<body>

<div id="login">

<h1>AteşChat 🔥</h1>

<input id="email" placeholder="Email">
<input id="password" placeholder="Şifre" type="password">
<input id="username" placeholder="Kullanıcı adı">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>


<div id="chat">

<div id="top">

<div id="user"></div>

<button onclick="logout()">Çıkış</button>

</div>

<div id="messages"></div>

<div id="sendArea">

<input id="messageInput" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script>

const firebaseConfig = {
  apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
  authDomain: "ateschat-cd9f4.firebaseapp.com",
  databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
  projectId: "ateschat-cd9f4",
  storageBucket: "ateschat-cd9f4.firebasestorage.app",
  messagingSenderId: "174732212740",
  appId: "1:174732212740:web:dcd4b60ed7cc380ca95351",
  measurementId: "G-1CBZNR0W3E"
};

firebase.initializeApp(firebaseConfig)

const auth = firebase.auth()
const db = firebase.database()

function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let username=document.getElementById("username").value

auth.createUserWithEmailAndPassword(email,password)

.then(user=>{

db.ref("users/"+user.user.uid).set({
username:username
})

})

}

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,password)

}

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="block"

db.ref("users/"+user.uid).once("value",snap=>{

let data=snap.val()

if(data){
document.getElementById("user").innerText=data.username
}

})

loadMessages()

}

})

function send(){

let text=document.getElementById("messageInput").value

if(text=="") return

let user=auth.currentUser

db.ref("users/"+user.uid).once("value",snap=>{

let name="Misafir"

if(snap.val()){
name=snap.val().username
}

db.ref("messages").push({

name:name,
text:text

})

})

document.getElementById("messageInput").value=""

}

function loadMessages(){

db.ref("messages").on("child_added",snap=>{

let m=snap.val()

let div=document.createElement("div")
div.className="msg"

div.innerText=m.name+" : "+m.text

document.getElementById("messages").appendChild(div)

window.scrollTo(0,document.body.scrollHeight)

})

}

function logout(){

auth.signOut()
location.reload()

}

</script>

</body>
</html>
