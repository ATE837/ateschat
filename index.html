<!DOCTYPE html>
<html>

<head>

<title>AteşChat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1f22;
color:white;
}

#login{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
border:none;
background:#5865F2;
color:white;
border-radius:5px;
cursor:pointer;
}

#app{
display:none;
height:100vh;
}

.sidebar{
width:80px;
background:#2b2d31;
height:100%;
float:left;
text-align:center;
padding-top:10px;
}

.server{
background:#404249;
margin:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.server:hover{
background:#5865F2;
}

.chatArea{
margin-left:80px;
margin-right:200px;
height:100%;
display:flex;
flex-direction:column;
}

.top{
background:#313338;
padding:10px;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
background:#404249;
margin:5px;
padding:8px;
border-radius:5px;
}

.sendBox{
padding:10px;
background:#313338;
}

.sendBox input{
width:70%;
}

.users{
width:200px;
background:#2b2d31;
position:absolute;
right:0;
top:0;
bottom:0;
padding:10px;
}

.user{
padding:5px;
background:#404249;
margin:5px 0;
border-radius:5px;
}

.admin{
color:#ff5555;
font-weight:bold;
}

</style>

</head>

<body>

<div id="login">

<h1>🔥 AteşChat</h1>

<input id="user" placeholder="Kullanıcı adı"><br>
<input id="pass" type="password" placeholder="Şifre"><br>

<button onclick="login()">Giriş</button>

</div>

<div id="app">

<div class="sidebar">

<div class="server" onclick="room('Genel')">💬</div>
<div class="server" onclick="room('Oyun')">🎮</div>
<div class="server" onclick="room('Müzik')">🎵</div>

</div>

<div class="chatArea">

<div class="top">

<span id="roomName">Genel</span>

</div>

<div class="messages" id="chat"></div>

<div class="sendBox">

<input id="msg" placeholder="Mesaj yaz...">
<button onclick="send()">Gönder</button>

</div>

</div>

<div class="users">

<h3>Online</h3>

<div id="userList"></div>

</div>

</div>

<script>

let users={
"Ateş Bey":"Ateş123"
}

let currentUser=""
let currentRoom="Genel"

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u]==p){

currentUser=u

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

addUser()

}else{

alert("Hatalı giriş")

}

}

function addUser(){

let list=document.getElementById("userList")

if(currentUser=="Ateş Bey"){

list.innerHTML += "<div class='user admin'>👑 "+currentUser+"</div>"

}else{

list.innerHTML += "<div class='user'>"+currentUser+"</div>"

}

}

function room(name){

currentRoom=name

document.getElementById("roomName").innerText=name

document.getElementById("chat").innerHTML=""

}

function send(){

let msg=document.getElementById("msg").value

let chat=document.getElementById("chat")

chat.innerHTML += "<div class='msg'><b>"+currentUser+":</b> "+msg+"</div>"

document.getElementById("msg").value=""

}

</script>

</body>

</html>
