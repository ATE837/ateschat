<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChat - Ana Sayfa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #1e1e2f;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* ANA UYGULAMA */
        #app {
            display: flex;
            height: 100vh;
        }

        /* SOL MENÜ */
        .sidebar-left {
            width: 72px;
            background: #2a2a3a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 8px;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #3a3a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            color: #aaa;
            font-size: 20px;
        }

        .server-icon:hover {
            background: #5865f2;
            color: white;
            border-radius: 16px;
        }

        .server-icon.home {
            background: #5865f2;
            color: white;
        }

        /* ORTA PANEL */
        .sidebar-middle {
            width: 240px;
            background: #2a2a3a;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3a3a4a;
        }

        .channel-header {
            padding: 16px;
            border-bottom: 1px solid #3a3a4a;
        }

        .channel-header h2 {
            font-size: 16px;
            color: #ddd;
        }

        .channel-list {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
        }

        .channel-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .channel-item:hover {
            background: #3a3a4a;
            color: white;
        }

        .channel-item.active {
            background: #5865f2;
            color: white;
        }

        .user-info {
            padding: 12px 16px;
            background: #1e1e2f;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #3a3a4a;
        }

        .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-status {
            font-size: 12px;
            color: #3ba55d;
        }

        /* CHAT ALANI */
        .chat-area {
            flex: 1;
            background: #2a2a3a;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid #3a3a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-info h3 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-icon:hover {
            background: #3a3a4a;
            color: white;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 12px;
            padding: 8px;
            border-radius: 4px;
        }

        .message:hover {
            background: #3a3a4a;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            color: #fff;
        }

        .message-time {
            font-size: 12px;
            color: #aaa;
        }

        .message-text {
            color: #ddd;
        }

        .message-input-container {
            padding: 16px;
            background: #1e1e2f;
        }

        .message-input-wrapper {
            display: flex;
            align-items: center;
            background: #3a3a4a;
            border-radius: 8px;
            padding: 8px;
        }

        .message-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            outline: none;
        }

        .send-btn {
            color: #5865f2 !important;
        }

        /* SAĞ PANEL */
        .sidebar-right {
            width: 240px;
            background: #2a2a3a;
            padding: 16px;
            border-left: 1px solid #3a3a4a;
        }

        .members-list {
            margin-top: 16px;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            gap: 8px;
        }

        .member-item:hover {
            background: #3a3a4a;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .member-name {
            flex: 1;
        }

        .member-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3ba55d;
        }

        /* GİRİŞ EKRANI */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1e1e2f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-container {
            background: #2a2a3a;
            padding: 40px;
            border-radius: 8px;
            width: 400px;
            text-align: center;
        }

        .login-container h1 {
            color: #5865f2;
            margin-bottom: 24px;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #3a3a4a;
            border: none;
            border-radius: 4px;
            color: white;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 8px 0;
        }

        .login-container button:hover {
            background: #4752c4;
        }

        .error {
            color: #ed4245;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <!-- GİRİŞ EKRANI -->
    <div id="loginScreen">
        <div class="login-container">
            <h1>✨ NovaChat</h1>
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="login()">Giriş Yap</button>
            <button onclick="register()">Kayıt Ol</button>
            <button onclick="adminLogin()" style="background: #ed4245;">Admin Giriş</button>
            <div id="error" class="error"></div>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="app" style="display: none;">
        <!-- SOL MENÜ -->
        <div class="sidebar-left">
            <div class="server-icon home" onclick="goHome()">
                <i class="fas fa-home"></i>
            </div>
            <div class="server-icon" onclick="createServer()">
                <i class="fas fa-plus"></i>
            </div>
            <div id="serverList"></div>
        </div>

        <!-- ORTA PANEL -->
        <div class="sidebar-middle">
            <div class="channel-header">
                <h2 id="serverName">Ana Sayfa</h2>
            </div>
            <div class="channel-list" id="channelList"></div>
            <div class="user-info" id="userInfo">
                <img id="userAvatar" src="https://via.placeholder.com/100">
                <div class="user-details">
                    <div class="user-name" id="userName">Ateş bey</div>
                    <div class="user-status">🟢 Çevrimiçi</div>
                </div>
                <button class="btn-icon" onclick="openProfile()">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </div>

        <!-- CHAT ALANI -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="channel-info">
                    <h3><i class="fas fa-hashtag"></i> <span id="channelName">genel</span></h3>
                </div>
                <div class="chat-actions">
                    <button class="btn-icon"><i class="fas fa-phone"></i></button>
                    <button class="btn-icon"><i class="fas fa-video"></i></button>
                </div>
            </div>
            
            <div class="messages-container" id="messages">
                <div style="text-align: center; color: #aaa; margin-top: 20px;">
                    <i class="fas fa-comment-dots" style="font-size: 48px;"></i>
                    <h3>Hoş geldin!</h3>
                    <p>Mesaj göndererek başla</p>
                </div>
            </div>
            
            <div class="message-input-container">
                <div class="message-input-wrapper">
                    <input type="text" id="messageInput" placeholder="Mesaj yaz..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button class="btn-icon send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- SAĞ PANEL -->
        <div class="sidebar-right">
            <h3>Üyeler</h3>
            <div class="members-list" id="membersList">
                <div class="member-item">
                    <img src="https://via.placeholder.com/100" class="member-avatar">
                    <span class="member-name">Ateş bey</span>
                    <span class="member-status"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
            authDomain: "ateschat-cd9f4.firebaseapp.com",
            projectId: "ateschat-cd9f4",
            storageBucket: "ateschat-cd9f4.firebasestorage.app",
            messagingSenderId: "174732212740",
            appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global
        let currentUser = null;
        let messages = [
            { user: 'Ateş bey', text: 'Merhaba!', time: '12:34', avatar: 'https://via.placeholder.com/100' },
            { user: 'Ateş bey', text: 'NovaChat çalışıyor!', time: '12:35', avatar: 'https://via.placeholder.com/100' }
        ];

        // Auth durumu
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('userName').innerText = user.displayName || 'Kullanıcı';
                loadMessages();
                loadServers();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // Giriş
        window.login = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, pass)
                .catch(error => document.getElementById('error').innerText = error.message);
        };

        // Kayıt
        window.register = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(email, pass)
                .then(cred => cred.user.updateProfile({ displayName: 'Kullanıcı' }))
                .catch(error => document.getElementById('error').innerText = error.message);
        };

        // Admin giriş
        window.adminLogin = () => {
            const pass = document.getElementById('password').value;
            if (pass === 'NovaChat2024!') {
                auth.signInWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!')
                    .catch(() => auth.createUserWithEmailAndPassword('admin@novachat.com', 'NovaChat2024!'));
            } else {
                document.getElementById('error').innerText = 'Hatalı şifre';
            }
        };

        // Mesajları yükle
        function loadMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            
            messages.forEach(msg => {
                container.innerHTML += `
                    <div class="message">
                        <img src="${msg.avatar}" class="message-avatar">
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-author">${msg.user}</span>
                                <span class="message-time">${msg.time}</span>
                            </div>
                            <div class="message-text">${msg.text}</div>
                        </div>
                    </div>
                `;
            });
        }

        // Mesaj gönder
        window.sendMessage = () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (text) {
                messages.push({
                    user: currentUser?.displayName || 'Ateş bey',
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    avatar: 'https://via.placeholder.com/100'
                });
                input.value = '';
                loadMessages();
            }
        };

        // Sunucu oluştur
        window.createServer = () => {
            alert('Sunucu oluşturma özelliği aktif!');
        };

        // Ana sayfa
        window.goHome = () => {
            document.getElementById('serverName').innerText = 'Ana Sayfa';
        };

        // Profil
        window.openProfile = () => {
            alert('Profil özelliği aktif!');
        };

        // Sunucuları yükle (test)
        function loadServers() {
            const list = document.getElementById('serverList');
            list.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'server-icon';
                div.innerText = 'S';
                list.appendChild(div);
            }
        }
    </script>
</body>
                        </html>
