<!DOCTYPE html>
<html>
<head>

<title>AteşChat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1f22;
color:white;
}

#login{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#5865F2;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

#app{
display:none;
height:100vh;
}

.servers{
width:70px;
background:#2b2d31;
height:100%;
float:left;
text-align:center;
padding-top:10px;
}

.server{
background:#404249;
margin:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.channels{
width:200px;
background:#313338;
height:100%;
float:left;
padding:10px;
}

.channel{
padding:8px;
cursor:pointer;
border-radius:5px;
display:flex;
justify-content:space-between;
}

.channel:hover{
background:#404249;
}

.chat{
margin-left:270px;
margin-right:200px;
height:100%;
display:flex;
flex-direction:column;
}

.top{
background:#313338;
padding:10px;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
display:flex;
margin:8px 0;
}

.avatar{
width:35px;
height:35px;
background:#5865F2;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:10px;
}

.msgContent{
background:#404249;
padding:8px;
border-radius:5px;
}

.time{
font-size:11px;
color:#aaa;
margin-left:5px;
}

.send{
background:#313338;
padding:10px;
}

.users{
width:200px;
background:#2b2d31;
position:absolute;
right:0;
top:0;
bottom:0;
padding:10px;
}

.user{
padding:5px;
background:#404249;
margin:5px 0;
border-radius:5px;
}

.admin{
color:#ff5555;
font-weight:bold;
}

.badge{
background:red;
border-radius:10px;
padding:2px 6px;
font-size:11px;
}

</style>

</head>

<body>

<div id="login">

<h1>🔥 AteşChat</h1>

<input id="user" placeholder="Kullanıcı adı"><br>
<input id="pass" type="password" placeholder="Şifre"><br>

<button onclick="login()">Giriş</button>

<p>
Admin: <b>Ateş Bey</b><br>
Şifre: <b>Ateş123</b>
</p>

</div>

<div id="app">

<div class="servers">

<div class="server">💬</div>
<div class="server">🎮</div>
<div class="server">🎵</div>

</div>

<div class="channels">

<h3>Kanallar</h3>

<div id="channelList">

<div class="channel" onclick="openRoom('genel')">
<span># genel</span>
<span id="badge_genel"></span>
</div>

</div>

</div>

<div class="chat">

<div class="top">

<span id="roomName">genel</span>

</div>

<div class="messages" id="chatBox"></div>

<div class="send">

<input id="msg" placeholder="Mesaj yaz..." onkeypress="enterSend(event)">
<button onclick="send()">Gönder</button>

</div>

</div>

<div class="users">

<h3>Kullanıcılar</h3>

<div id="userList"></div>

</div>

</div>

<script>

let users={
"Ateş Bey":"Ateş123"
}

let currentUser=""
let currentRoom="genel"
let unread={
genel:0
}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u]==p){

currentUser=u

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

addUser()

}else{

alert("Hatalı giriş")

}

}

function addUser(){

let list=document.getElementById("userList")

if(currentUser=="Ateş Bey"){

list.innerHTML += "<div class='user admin'>👑 "+currentUser+"</div>"

}else{

list.innerHTML += "<div class='user'>"+currentUser+"</div>"

}

}

function openRoom(name){

currentRoom=name

document.getElementById("roomName").innerText=name

document.getElementById("badge_"+name).innerText=""

unread[name]=0

}

function send(){

let msg=document.getElementById("msg").value

if(msg=="") return

let chat=document.getElementById("chatBox")

let time=new Date().toLocaleTimeString().slice(0,5)

chat.innerHTML += `
<div class="msg">
<div class="avatar">${currentUser[0]}</div>
<div>
<div class="msgContent">
<b>${currentUser}</b>
<span class="time">${time}</span><br>
${msg}
</div>
</div>
</div>
`

document.getElementById("msg").value=""

}

function enterSend(e){

if(e.key==="Enter"){

send()

}

}

</script>

</body>
</html>
