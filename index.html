<!DOCTYPE html>
<html>
<head>
<title>AteşChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#1e1f22;
color:white;
display:flex;
height:100vh;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
}

button{
padding:8px 14px;
background:#5865F2;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#app{
display:none;
width:100%;
height:100%;
display:flex;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.top{
background:#313338;
padding:10px;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
background:#404249;
padding:8px;
border-radius:6px;
margin:6px 0;
}

.send{
display:flex;
padding:10px;
background:#313338;
}

.send input{
flex:1;
margin-right:6px;
}

</style>

</head>

<body>

<div id="login">

<h2>🔥 AteşChat</h2>

<input id="username" placeholder="Kullanıcı adı"><br>
<button onclick="login()">Giriş</button>

</div>

<div id="app">

<div class="chat">

<div class="top">💬 Genel Sohbet</div>

<div class="messages" id="chat"></div>

<div class="send">

<input id="message" placeholder="Mesaj yaz..." onkeypress="enterSend(event)">
<button onclick="send()">Gönder</button>

</div>

</div>

</div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
  authDomain: "ateschat-cd9f4.firebaseapp.com",
  projectId: "ateschat-cd9f4",
  storageBucket: "ateschat-cd9f4.firebasestorage.app",
  messagingSenderId: "174732212740",
  appId: "1:174732212740:web:dcd4b60ed7cc380ca95351",
  measurementId: "G-1CBZNR0W3E"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let user="";

function login(){

user=document.getElementById("username").value;

if(user=="") return alert("Kullanıcı adı yaz");

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";

loadMessages();

}

function send(){

let text=document.getElementById("message").value;

if(text=="") return;

db.ref("messages").push({
user:user,
text:text
});

document.getElementById("message").value="";

}

function enterSend(e){

if(e.key==="Enter") send();

}

function loadMessages(){

db.ref("messages").on("child_added",function(snapshot){

let msg=snapshot.val();

let div=document.createElement("div");

div.className="msg";

div.innerHTML="<b>"+msg.user+"</b>: "+msg.text;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=999999;

});

}

</script>

</body>
</html>
