<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaChat - Yıldızlar kadar parlak</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- SOL MENÜ: Sunucular ve DM Listesi -->
        <div class="sidebar-left">
            <div class="server-list">
                <div class="server-icon home" id="homeBtn">
                    <i class="fas fa-home"></i>
                </div>
                <div class="server-icon add-server" id="addServerBtn">
                    <i class="fas fa-plus"></i>
                </div>
                <div class="server-divider"></div>
                <div id="serverList" class="server-items"></div>
            </div>
            
            <div class="dm-section">
                <div class="dm-header">
                    <h3><i class="fas fa-comment-dots"></i> DM</h3>
                    <button id="newDmBtn" class="btn-icon"><i class="fas fa-pen"></i></button>
                </div>
                <div id="dmList" class="dm-list"></div>
            </div>
        </div>

        <!-- ORTA PANEL: Kanal Listesi -->
        <div class="sidebar-middle">
            <div class="channel-header">
                <h2 id="currentServerName">Ana Sayfa</h2>
                <button id="channelSettingsBtn" class="btn-icon"><i class="fas fa-cog"></i></button>
            </div>
            <div class="channel-search">
                <input type="text" placeholder="Ara" id="searchInput">
            </div>
            <div class="channel-categories">
                <div class="category">
                    <div class="category-header">
                        <i class="fas fa-chevron-down"></i>
                        <span>Metin Kanalları</span>
                        <button id="addChannelBtn" class="btn-icon"><i class="fas fa-plus"></i></button>
                    </div>
                    <div id="channelList" class="channel-items"></div>
                </div>
            </div>
            <div class="user-info" id="currentUserInfo">
                <img src="https://via.placeholder.com/100" alt="Avatar" id="currentUserAvatar">
                <div class="user-details">
                    <span id="currentUserName">Yükleniyor...</span>
                    <span class="user-status online" id="currentUserStatus">🟢 Çevrimiçi</span>
                </div>
                <button id="openProfileBtn" class="btn-icon"><i class="fas fa-user"></i></button>
            </div>
        </div>

        <!-- SAĞ PANEL: Sohbet Alanı -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="channel-info">
                    <h3 id="currentChannelName"># genel</h3>
                    <span id="channelTopic"></span>
                </div>
                <div class="member-count" id="memberCount">
                    <i class="fas fa-user"></i> <span>0</span>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="message-input-container">
                <div class="message-input-wrapper">
                    <button class="emoji-picker-btn"><i class="far fa-smile"></i></button>
                    <input type="text" id="messageInput" placeholder="Mesajınızı yazın..." autocomplete="off">
                    <button class="send-btn" id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- SAĞ PANEL: Üye Listesi -->
        <div class="sidebar-right">
            <div class="members-header">
                <h3>Üyeler - <span id="onlineCount">0</span></h3>
            </div>
            <div id="membersList" class="members-list"></div>
            
            <!-- Hızlı Profil -->
            <div id="quickProfile" class="quick-profile" style="display: none;">
                <button class="close-quick-profile"><i class="fas fa-times"></i></button>
                <div class="profile-content"></div>
            </div>
        </div>
    </div>

    <!-- PROFİL MODALI -->
    <div id="profileModal" class="modal">
        <div class="modal-content profile-modal">
            <div class="modal-header">
                <h2>Profil</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="profile-avatar-section">
                    <img src="https://via.placeholder.com/100" alt="Avatar" id="modalProfileAvatar">
                    <button id="changeAvatarBtn" class="btn-small">Fotoğraf Değiştir</button>
                </div>
                <div class="profile-info-section">
                    <div class="info-row">
                        <label>Kullanıcı Adı</label>
                        <div class="info-value">
                            <span id="modalProfileName"></span>
                            <button class="btn-icon-small edit-btn" data-field="displayName"><i class="fas fa-pen"></i></button>
                        </div>
                    </div>
                    <div class="info-row">
                        <label>E-posta</label>
                        <span id="modalProfileEmail"></span>
                    </div>
                    <div class="info-row">
                        <label>Hakkında</label>
                        <div class="info-value">
                            <p id="modalProfileBio">Kendinizden bahsedin...</p>
                            <button class="btn-icon-small edit-btn" data-field="bio"><i class="fas fa-pen"></i></button>
                        </div>
                    </div>
                    <div class="info-row">
                        <label>Durum</label>
                        <select id="modalProfileStatus">
                            <option value="online">🟢 Çevrimiçi</option>
                            <option value="idle">🌙 Boşta</option>
                            <option value="dnd">⛔ Rahatsız Etme</option>
                            <option value="invisible">⚫ Görünmez</option>
                        </select>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="modalFriendCount">0</span>
                        <span class="stat-label">Arkadaş</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="modalServerCount">0</span>
                        <span class="stat-label">Sunucu</span>
                    </div>
                </div>
                <div class="profile-actions">
                    <button id="logoutBtn" class="btn-danger">Çıkış Yap</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SUNUCU OLUŞTUR MODALI -->
    <div id="createServerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Sunucu Oluştur</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="text" id="serverNameInput" placeholder="Sunucu adı">
                <div class="modal-actions">
                    <button id="cancelCreateServer">İptal</button>
                    <button id="confirmCreateServer">Oluştur</button>
                </div>
            </div>
        </div>
    </div>

    <!-- KANAL OLUŞTUR MODALI -->
    <div id="createChannelModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Kanal Oluştur</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="text" id="channelNameInput" placeholder="kanal-adi">
                <div class="modal-actions">
                    <button id="cancelCreateChannel">İptal</button>
                    <button id="confirmCreateChannel">Oluştur</button>
                </div>
            </div>
        </div>
    </div>

    <!-- YENİ DM MODALI -->
    <div id="newDmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Yeni Mesaj</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="text" id="dmUserSearch" placeholder="Kullanıcı ara...">
                <div id="dmSearchResults" class="search-results"></div>
            </div>
        </div>
    </div>

    <!-- FIREBASE (eski sürüm) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <!-- SENİN DOSYALARIN -->
    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
                                </html>
