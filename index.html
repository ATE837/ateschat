<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AteşChat V19 🔥</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

#loginPage{
display:flex;
flex-direction:column;
align-items:center;
margin-top:120px;
gap:10px;
}

input{
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px 15px;
background:#ff6a00;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

#chatPage{
display:none;
height:100vh;
display:flex;
}

#rooms{
width:200px;
background:#1b1b1b;
padding:10px;
}

.room{
padding:8px;
background:#222;
margin-bottom:5px;
border-radius:6px;
cursor:pointer;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
background:#1c1c1c;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

#sendBar{
display:flex;
padding:10px;
background:#111;
}

#sendBar input{
flex:1;
margin-right:10px;
}

</style>

</head>

<body>

<div id="loginPage">

<h1>🔥 AteşChat</h1>

<input id="username" placeholder="Kullanıcı adı">

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Şifre">

<button onclick="register()">Kayıt Ol</button>

<button onclick="login()">Giriş Yap</button>

</div>


<div id="chatPage">

<div id="rooms">

<h3>Odalar</h3>

<div class="room" onclick="changeRoom('genel')"># genel</div>
<div class="room" onclick="changeRoom('sohbet')"># sohbet</div>
<div class="room" onclick="changeRoom('oyun')"># oyun</div>

</div>


<div id="chat">

<div id="messages"></div>

<div id="sendBar">

<input id="messageInput" placeholder="Mesaj yaz...">

<button onclick="sendMessage()">Gönder</button>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"

import {
getDatabase,
ref,
push,
set,
onChildAdded
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"


const firebaseConfig = {

apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain: "ateschat-cd9f4.firebaseapp.com",
databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId: "ateschat-cd9f4",
storageBucket: "ateschat-cd9f4.firebasestorage.app",
messagingSenderId: "174732212740",
appId: "1:174732212740:web:9a8a298eca9b3313a95351"

}

const app = initializeApp(firebaseConfig)

const auth = getAuth(app)

const db = getDatabase(app)

let room="genel"


window.register=function(){

createUserWithEmailAndPassword(auth,email.value,password.value)

.then(()=>{

set(ref(db,"users/"+auth.currentUser.uid),{

name:username.value

})

alert("Kayıt başarılı")

})

.catch(e=>alert(e.message))

}


window.login=function(){

signInWithEmailAndPassword(auth,email.value,password.value)

.catch(e=>alert(e.message))

}


onAuthStateChanged(auth,(user)=>{

if(user){

loginPage.style.display="none"

chatPage.style.display="flex"

loadMessages()

}

})


window.sendMessage=function(){

push(ref(db,"rooms/"+room),{

user:username.value,

text:messageInput.value,

time:Date.now()

})

messageInput.value=""

}


function loadMessages(){

messages.innerHTML=""

onChildAdded(ref(db,"rooms/"+room),(data)=>{

let m=data.val()

let div=document.createElement("div")

div.className="message"

div.innerHTML="<b>"+m.user+"</b><br>"+m.text

messages.appendChild(div)

})

}


window.changeRoom=function(r){

room=r

loadMessages()

}

</script>

</body>
</html>
