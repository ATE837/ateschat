<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AteşChat V9</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.page{
display:none;
height:100vh;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#ff3c3c;
color:white;
width:260px;
font-size:16px;
}

input{
padding:12px;
border:none;
border-radius:10px;
width:260px;
font-size:16px;
}

#chat{
display:flex;
flex-direction:column;
height:100vh;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:10px;
max-width:80%;
}

.me{
background:#ff3c3c;
margin-left:auto;
}

#sendbox{
display:flex;
position:fixed;
bottom:0;
left:0;
right:0;
background:#1b1b1b;
padding:10px;
}

#msgInput{
flex:1;
border-radius:10px;
border:none;
padding:10px;
}

#sendbtn{
width:80px;
margin-left:5px;
}

</style>
</head>

<body>

<!-- HOME -->

<div id="home" class="page center" style="display:flex">

<h2>🔥 AteşChat V9</h2>

<button onclick="showLogin()">Giriş Yap</button>

<button onclick="showRegister()">Kayıt Ol</button>

</div>

<!-- LOGIN -->

<div id="login" class="page center">

<h2>Giriş</h2>

<input id="loginEmail" placeholder="Email">

<input id="loginPass" type="password" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

<button onclick="backHome()">Geri</button>

</div>

<!-- REGISTER -->

<div id="register" class="page center">

<h2>Kayıt Ol</h2>

<input id="regUser" placeholder="Kullanıcı adı">

<input id="regEmail" placeholder="Email">

<input id="regPass" type="password" placeholder="Şifre">

<button onclick="register()">Hesap oluştur</button>

<button onclick="backHome()">Geri</button>

</div>

<!-- SERVER PANEL -->

<div id="servers" class="page center">

<h2>Sunucu Paneli</h2>

<button onclick="createServer()">Sunucu Oluştur</button>

<input id="joinCode" placeholder="Davet kodu">

<button onclick="joinServer()">Sunucuya Katıl</button>

</div>

<!-- CHAT -->

<div id="chat" class="page">

<div style="padding:15px;background:#1b1b1b">

🔥 AteşChat Sunucu

</div>

<div id="messages"></div>

<div id="sendbox">

<input id="msgInput" placeholder="Mesaj yaz">

<button id="sendbtn" onclick="send()">Gönder</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain:"ateschat-cd9f4.firebaseapp.com",
databaseURL:"https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId:"ateschat-cd9f4"
}

firebase.initializeApp(firebaseConfig)

let db=firebase.database()

let user=""
let currentServer=""

/* SAYFA */

function hideAll(){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

}

function showLogin(){

hideAll()
document.getElementById("login").style.display="flex"

}

function showRegister(){

hideAll()
document.getElementById("register").style.display="flex"

}

function backHome(){

hideAll()
document.getElementById("home").style.display="flex"

}

/* REGISTER */

function register(){

let u=document.getElementById("regUser").value
let e=document.getElementById("regEmail").value
let p=document.getElementById("regPass").value

db.ref("users").push({
user:u,
email:e,
pass:p
})

alert("Kayıt başarılı")

backHome()

}

/* LOGIN */

function login(){

let e=document.getElementById("loginEmail").value
let p=document.getElementById("loginPass").value

db.ref("users").once("value",snap=>{

snap.forEach(d=>{

let data=d.val()

if(data.email==e && data.pass==p){

user=data.user

hideAll()
document.getElementById("servers").style.display="flex"

}

})

})

}

/* SUNUCU OLUŞTUR */

function createServer(){

let code=Math.random().toString(36).substring(2,8)

db.ref("servers/"+code).set({

owner:user,
created:Date.now()

})

alert("Davet kodu: "+code)

currentServer=code

openChat()

}

/* SUNUCUYA KATIL */

function joinServer(){

let code=document.getElementById("joinCode").value

db.ref("servers/"+code).once("value",snap=>{

if(snap.exists()){

currentServer=code
openChat()

}else{

alert("Kod yanlış")

}

})

}

/* CHAT */

function openChat(){

hideAll()
document.getElementById("chat").style.display="flex"

loadMessages()

}

function send(){

let text=document.getElementById("msgInput").value

if(text=="")return

db.ref("messages/"+currentServer).push({

user:user,
text:text,
time:Date.now()

})

document.getElementById("msgInput").value=""

}

function loadMessages(){

db.ref("messages/"+currentServer).on("child_added",snap=>{

let d=snap.val()

let div=document.createElement("div")

div.className="msg"

if(d.user==user){

div.classList.add("me")

}

div.innerHTML="<b>"+d.user+"</b><br>"+d.text

document.getElementById("messages").appendChild(div)

})

}

</script>

</body>
</html>
