<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AteşChat V30 Stable 🔥</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->

<div id="login">

<h2>AteşChat 🔥</h2>

<input id="username" placeholder="Kullanıcı adı">

<input id="password" type="password" placeholder="Şifre">

<button id="registerBtn">Kayıt Ol</button>

<button id="loginBtn">Giriş Yap</button>

</div>



<!-- CHAT APP -->

<div id="app" style="display:none;">

<div id="sidebar">

<h3>Odalar</h3>

<div class="room" onclick="openRoom('global')">🌍 Global</div>

<div class="room" onclick="openRoom('sohbet')">💬 Sohbet</div>

<div class="room" onclick="openRoom('gaming')">🎮 Gaming</div>


<h3>Kullanıcılar</h3>

<div id="users"></div>

</div>



<div id="chat">

<div id="top">

<span id="roomName">Global</span>

<button onclick="logout()">Çıkış</button>

</div>


<div id="messages"></div>


<div id="sendBox">

<input id="messageInput" placeholder="Mesaj yaz...">

<button onclick="send()">Gönder</button>

</div>

</div>

</div>



<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>



<!-- Scripts -->

<script src="firebase.js"></script>

<script src="auth.js"></script>

<script src="chat.js"></script>

<script src="dm.js"></script>

<script src="emoji.js"></script>

<script src="admin.js"></script>

<script src="ui.js"></script>

<script src="app.js"></script>


</body>

</html>
