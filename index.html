<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AteşChat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1e1f22;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#login{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

#chat{
display:none;
flex-direction:column;
height:100vh;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin-bottom:10px;
}

.username{
color:#5865f2;
font-weight:bold;
}

.inputArea{
display:flex;
padding:10px;
background:#2b2d31;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
}

.inputArea button{
margin-left:10px;
padding:10px;
border:none;
background:#5865f2;
color:white;
border-radius:5px;
}

</style>
</head>

<body>

<div id="login">

<h2>🔥 AteşChat</h2>

<input id="usernameInput" placeholder="Kullanıcı adı">

<button onclick="login()">Giriş</button>

</div>

<div id="chat">

<div id="messages"></div>

<div class="inputArea">

<input id="messageInput" placeholder="Mesaj yaz...">

<button onclick="sendMessage()">Gönder</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain: "ateschat-cd9f4.firebaseapp.com",
databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId: "ateschat-cd9f4",
storageBucket: "ateschat-cd9f4.appspot.com",
messagingSenderId: "174732212740",
appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username="";

window.login=function(){

username=document.getElementById("usernameInput").value;

if(username==="") return;

document.getElementById("login").style.display="none";

document.getElementById("chat").style.display="flex";

}

window.sendMessage=function(){

const input=document.getElementById("messageInput");

if(input.value==="") return;

push(ref(db,"messages"),{
user:username,
text:input.value
});

input.value="";

}

onChildAdded(ref(db,"messages"),(data)=>{

const msg=data.val();

const div=document.createElement("div");

div.className="message";

div.innerHTML="<span class='username'>"+msg.user+":</span> "+msg.text;

document.getElementById("messages").appendChild(div);

});

</script>

</body>
</html>
