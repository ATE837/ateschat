<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AteşChat</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
text-align:center;
}

h1{
margin-top:40px;
}

input{
padding:12px;
margin:6px;
width:250px;
border-radius:8px;
border:none;
}

button{
padding:12px;
margin:6px;
border:none;
background:#ff5500;
color:white;
border-radius:8px;
cursor:pointer;
}

#chat{
display:none;
}

#messages{
height:60vh;
overflow:auto;
margin:20px;
background:#1a1a1a;
padding:10px;
border-radius:10px;
}

.msg{
background:#262626;
padding:10px;
margin:6px;
border-radius:8px;
text-align:left;
}

</style>

</head>

<body>

<h1>AteşChat 🔥</h1>

<div id="login">

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Şifre"><br>

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>


<div id="chat">

<div id="messages"></div>

<input id="msg" placeholder="Mesaj yaz">
<button onclick="send()">Gönder</button>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain: "ateschat-cd9f4.firebaseapp.com",
databaseURL: "https://ateschat-cd9f4-default-rtdb.firebaseio.com",
projectId: "ateschat-cd9f4",
storageBucket: "ateschat-cd9f4.appspot.com",
messagingSenderId: "174732212740",
appId: "1:174732212740:web:dcd4b60ed7cc380ca95351"
};

firebase.initializeApp(firebaseConfig);

function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

firebase.auth().createUserWithEmailAndPassword(email,password)

.then(()=>{

alert("Kayıt başarılı")

})

.catch(e=>alert(e.message))

}


function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

firebase.auth().signInWithEmailAndPassword(email,password)

.then(()=>{

document.getElementById("login").style.display="none"
document.getElementById("chat").style.display="block"

loadMessages()

})

.catch(e=>alert(e.message))

}


function send(){

let text=document.getElementById("msg").value

firebase.database().ref("messages").push({

user:firebase.auth().currentUser.email,
text:text,
time:Date.now()

})

document.getElementById("msg").value=""

}


function loadMessages(){

firebase.database().ref("messages").on("child_added",function(data){

let msg=data.val()

let div=document.createElement("div")

div.className="msg"

div.innerHTML="<b>"+msg.user+"</b><br>"+msg.text

document.getElementById("messages").appendChild(div)

})

}

</script>

</body>
</html>
