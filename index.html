<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AteşChat V24 ULTRA 🔥</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="login">

<h1>AteşChat 🔥</h1>

<input id="username" placeholder="Kullanıcı adı">
<input id="password" type="password" placeholder="Şifre">
<input id="photo" placeholder="Profil foto linki (opsiyonel)">

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

<div id="error"></div>

</div>


<div id="app">

<div id="sidebar">

<h2>Odalar</h2>

<div onclick="openRoom('global')">🌍 Global</div>
<div onclick="openRoom('oda1')">🎮 Oda 1</div>
<div onclick="openRoom('oda2')">💬 Oda 2</div>

<h2>Kullanıcılar</h2>

<div id="users"></div>

</div>


<div id="chat">

<div id="top">

<div id="roomName">Global Chat</div>
<button onclick="logout()">Çıkış</button>

</div>

<div id="messages"></div>

<div id="sendArea">

<input id="messageInput" placeholder="Mesaj yaz...">

<button onclick="send()">Gönder</button>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>

</html>
