<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AteşChat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1e1f22;
color:white;
display:flex;
height:100vh;
}

.serverBar{
width:70px;
background:#111;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
}

.server{
width:50px;
height:50px;
background:#333;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
cursor:pointer;
}

.channelBar{
width:220px;
background:#2b2d31;
padding:10px;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#313338;
padding:15px;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin-bottom:10px;
}

.username{
color:#5865f2;
font-weight:bold;
}

.inputArea{
display:flex;
background:#313338;
padding:10px;
}

.inputArea input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
background:#1e1f22;
color:white;
}

.inputArea button{
margin-left:10px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#5865f2;
color:white;
cursor:pointer;
}

.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1e1f22;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.login input{
padding:10px;
border:none;
border-radius:6px;
margin-bottom:10px;
}

.login button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#5865f2;
color:white;
}

</style>
</head>

<body>

<div class="serverBar">
<div class="server">🔥</div>
</div>

<div class="channelBar">
<h3>AteşChat</h3>
<p># genel</p>
</div>

<div class="chat">

<div class="header">
# genel sohbet
</div>

<div id="messages" class="messages"></div>

<div class="inputArea">
<input id="messageInput" placeholder="Mesaj yaz...">
<button onclick="sendMessage()">Gönder</button>
</div>

</div>

<div class="login" id="login">

<h2>🔥 AteşChat</h2>

<input id="usernameInput" placeholder="Kullanıcı adı">

<button onclick="login()">Giriş</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCwwqd4FfhvLRQu8DUUfbdorIu3iJpkHMM",
authDomain: "ateschat-cd9f4.firebaseapp.com",
projectId: "ateschat-cd9f4",
storageBucket: "ateschat-cd9f4.firebasestorage.app",
messagingSenderId: "174732212740",
appId: "1:174732212740:web:dcd4b60ed7cc380ca95351",
measurementId: "G-1CBZNR0W3E"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username="";

window.login = function(){

const input=document.getElementById("usernameInput");

if(input.value.trim()=="") return;

username=input.value;

document.getElementById("login").style.display="none";

}

window.sendMessage = function(){

const input=document.getElementById("messageInput");

if(input.value.trim()=="") return;

push(ref(db,"messages"),{

user:username,
text:input.value

});

input.value="";

}

const messagesRef = ref(db,"messages");

onChildAdded(messagesRef,(data)=>{

const msg=data.val();

const div=document.createElement("div");

div.className="message";

div.innerHTML="<span class='username'>"+msg.user+":</span> "+msg.text;

document.getElementById("messages").appendChild(div);

});

</script>

</body>
</html>
